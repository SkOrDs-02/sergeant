<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <title>Sergeant · Product Hunt launch storyboard · 90s walkthrough</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      --finyk: #047857;
      --finyk-light: #34d399;
      --fizruk: #0e7490;
      --fizruk-light: #22d3ee;
      --routine: #c23a3a;
      --routine-light: #f97066;
      --nutrition: #466212;
      --nutrition-light: #92cc17;

      --bg-cream: #fdf9f3;
      --bg-alt: #faf7f1;
      --surface: #ffffff;
      --border: #ebe4da;
      --text: #1c1917;
      --muted: #57534e;
      --subtle: #a8a29e;

      --font-sans: "Manrope", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      --font-serif: "Fraunces", serif;
    }

    html, body { margin: 0; padding: 0; background: #14110f; font-family: var(--font-sans); }
    * { box-sizing: border-box; }

    /* ── Storyboard panel · 600 × 660 ── */
    .panel {
      width: 100%;
      height: 100%;
      background: var(--bg-cream);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 4px;
      font-family: var(--font-sans);
      color: var(--text);
    }

    /* Top metadata strip */
    .panel-meta {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--text);
      color: #faf7f1;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .panel-meta .left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .panel-meta .id {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 3px 8px;
      letter-spacing: 0.18em;
      font-weight: 600;
      font-size: 12px;
    }
    .panel-meta .duration { color: var(--finyk-light); font-weight: 600; }

    /* 16:9 frame area */
    .frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1.5px solid var(--text);
    }

    /* Frame caption overlay (what shows on-screen during this beat) */
    .on-screen {
      position: absolute;
      bottom: 12px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(250,247,241,0.7);
      font-weight: 500;
      pointer-events: none;
      z-index: 5;
    }
    .on-screen.dark { color: rgba(28,25,23,0.55); }
    .on-screen .tag {
      padding: 4px 8px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      border-radius: 5px;
      color: rgba(250,247,241,0.95);
    }
    .on-screen.dark .tag { background: rgba(255,255,255,0.78); color: rgba(28,25,23,0.85); }

    /* Bottom info block */
    .info {
      flex: 1;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #ffffff;
    }
    .info-row { display: flex; gap: 14px; align-items: flex-start; }
    .info-tag {
      width: 72px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--subtle);
      font-weight: 600;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .info-text {
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.4;
      color: var(--text);
      font-weight: 500;
      flex: 1;
    }
    .info-text.vo {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 500;
    }

    /* ── Generic phone frame used inside many panels ── */
    .ph {
      width: 200px;
      aspect-ratio: 9 / 19.5;
      background: #14110f;
      border-radius: 26px;
      padding: 6px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.25);
    }
    .ph .scr {
      width: 100%; height: 100%;
      background: var(--bg-cream);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 14px 10px;
    }
    .ph .notch {
      position: absolute;
      top: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px; height: 14px;
      background: #14110f;
      border-radius: 9999px;
      z-index: 2;
    }
    .ph .stat {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--text);
      margin-top: 4px;
      font-weight: 600;
    }
    .ph-ttl {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-top: 10px;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .ph-sub {
      font-family: var(--font-mono);
      font-size: 6.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-top: 2px;
      font-weight: 600;
    }
    .ph-hero {
      border-radius: 10px;
      padding: 8px 10px;
      color: #fff;
      margin-top: 8px;
    }
    .ph-hero .l {
      font-family: var(--font-mono);
      font-size: 6.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.85;
      font-weight: 500;
    }
    .ph-hero .v {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-top: 3px;
    }
    .ph-hero .c { font-size: 7.5px; opacity: 0.85; margin-top: 2px; }

    .ph-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 4px;
    }
    .ph-row .nm { font-size: 8.5px; font-weight: 600; color: var(--text); }
    .ph-row .v { font-family: var(--font-mono); font-size: 8px; font-weight: 600; }

    .ph-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-top: 6px;
    }
    .ph-mod {
      border-radius: 7px;
      padding: 5px 7px;
      color: #fff;
      min-height: 38px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .ph-mod .n {
      font-family: var(--font-mono);
      font-size: 5.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.85;
      font-weight: 500;
    }
    .ph-mod .vv { font-family: var(--font-sans); font-weight: 800; font-size: 12px; letter-spacing: -0.02em; line-height: 1; }
    .ph-mod .cc { font-size: 5.5px; opacity: 0.85; }

    /* Heatmap (small) */
    .mini-heat {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      gap: 1.5px;
      margin-top: 6px;
    }
    .mini-heat .c {
      aspect-ratio: 1;
      background: #f5ead8;
      border-radius: 1.5px;
    }
    .mini-heat .c.l1 { background: rgba(194,58,58,0.3); }
    .mini-heat .c.l2 { background: rgba(194,58,58,0.6); }
    .mini-heat .c.l3 { background: var(--routine); }

    /* ── PANEL 01 · Hook ─────────────────────────────── */
    .scene-hook {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #14110f 0%, #1f1b18 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scene-hook .question {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 500;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: -0.015em;
      color: #faf7f1;
      max-width: 480px;
      text-align: center;
      text-wrap: balance;
    }
    .scene-hook .question b { color: var(--finyk-light); font-style: normal; font-weight: 700; font-family: var(--font-sans); letter-spacing: -0.025em; }
    .scene-hook .apps {
      position: absolute;
      inset: auto 0 0 0;
      bottom: 36px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .scene-hook .apps .a {
      width: 38px; height: 38px;
      border-radius: 9px;
      background: #2a2622;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 8px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    /* ── PANEL 02 · Dashboard ────────────────────────── */
    .scene-dashboard {
      width: 100%; height: 100%;
      background: linear-gradient(170deg, #ecfdf5 0%, #d1fae5 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 0 40px;
    }
    .scene-dashboard .caption {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 30px;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.05;
      text-wrap: balance;
    }
    .scene-dashboard .caption .accent { color: var(--finyk); }
    .scene-dashboard .ph-wrap { display: flex; justify-content: center; }

    /* ── PANEL 03–06: action shots ───────────────────── */
    .scene-mod {
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      align-items: center;
      padding: 0 30px 0 36px;
    }
    .scene-mod.finyk     { background: linear-gradient(170deg, #ecfdf5 0%, #d1fae5 100%); }
    .scene-mod.fizruk    { background: linear-gradient(170deg, #ecfeff 0%, #cffafe 100%); }
    .scene-mod.routine   { background: linear-gradient(170deg, #fff5f3 0%, #ffe4e1 100%); }
    .scene-mod.nutrition { background: linear-gradient(170deg, #f8fee7 0%, #ecfccb 100%); }
    .scene-mod .label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .scene-mod.finyk     .label { color: var(--finyk); }
    .scene-mod.fizruk    .label { color: var(--fizruk); }
    .scene-mod.routine   .label { color: var(--routine); }
    .scene-mod.nutrition .label { color: var(--nutrition); }
    .scene-mod .headline {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 26px;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1.05;
      margin-bottom: 10px;
      text-wrap: balance;
    }
    .scene-mod .substep {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      line-height: 1.55;
    }
    .scene-mod .substep .step { color: var(--text); font-weight: 600; }
    .scene-mod .ph-wrap { display: flex; justify-content: center; }

    /* ── PANEL 07 · HubChat AI ───────────────────────── */
    .scene-ai {
      width: 100%; height: 100%;
      background: radial-gradient(900px 600px at 70% 80%, #047857 0%, #14110f 60%);
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      align-items: center;
      padding: 0 30px 0 36px;
      position: relative;
    }
    .scene-ai .label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--finyk-light);
      margin-bottom: 10px;
    }
    .scene-ai .headline {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.03em;
      color: #faf7f1;
      line-height: 1.0;
      margin-bottom: 14px;
      text-wrap: balance;
    }
    .scene-ai .insight {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 14px 16px;
      backdrop-filter: blur(12px);
    }
    .scene-ai .insight .who {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--finyk-light);
      font-weight: 500;
      margin-bottom: 6px;
    }
    .scene-ai .insight .msg {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 14px;
      line-height: 1.32;
      color: #faf7f1;
      font-weight: 500;
    }
    .scene-ai .ph-wrap {
      display: flex;
      justify-content: center;
    }

    /* ── PANEL 08 · CTA ──────────────────────────────── */
    .scene-cta {
      width: 100%; height: 100%;
      background: var(--bg-cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      position: relative;
    }
    .scene-cta .ttl {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 44px;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
    }
    .scene-cta .ttl .accent { color: var(--finyk); }
    .scene-cta .url {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
      padding: 8px 18px;
      border: 2px solid var(--text);
      border-radius: 9999px;
    }
    .scene-cta .strip {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .scene-cta .strip span {
      width: 32px; height: 5px; border-radius: 9999px;
    }

    /* ── PANEL 09 · Logo end-card ─────────────────────── */
    .scene-logo {
      width: 100%; height: 100%;
      background: #14110f;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .scene-logo .mark {
      width: 70px; height: 70px;
      border-radius: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 3px;
      padding: 5px;
      background: rgba(255,255,255,0.04);
    }
    .scene-logo .mark span { border-radius: 5px; }
    .scene-logo .mark .a { background: var(--finyk-light); }
    .scene-logo .mark .b { background: var(--fizruk-light); }
    .scene-logo .mark .c { background: var(--routine-light); }
    .scene-logo .mark .d { background: var(--nutrition-light); }
    .scene-logo .word {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 56px;
      letter-spacing: -0.04em;
      color: #faf7f1;
      line-height: 1;
    }
    .scene-logo .corner {
      position: absolute;
      bottom: 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(250,247,241,0.4);
      font-weight: 500;
    }

    /* Subtle cursor / tap dot for action shots */
    .tap-dot {
      position: absolute;
      width: 22px; height: 22px;
      border-radius: 9999px;
      background: rgba(4,120,87,0.18);
      border: 2px solid var(--finyk);
      box-shadow: 0 0 0 6px rgba(4,120,87,0.12);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel" src="../_shared/components/design-canvas.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    /* Reusable storyboard panel shell */
    function Panel({ idx, time, dur, scene, frame, vo, caption, onScreen, onScreenDark }) {
      return (
        <div className="panel">
          <div className="panel-meta">
            <div className="left">
              <span className="id">{idx}</span>
              <span>{time}</span>
              <span>·</span>
              <span>{scene}</span>
            </div>
            <span className="duration">{dur}</span>
          </div>
          <div className="frame">
            {frame}
            {onScreen && (
              <div className={"on-screen " + (onScreenDark ? "dark" : "")}>
                <span className="tag">{onScreen[0]}</span>
                {onScreen[1] && <span className="tag">{onScreen[1]}</span>}
              </div>
            )}
          </div>
          <div className="info">
            <div className="info-row">
              <span className="info-tag">VO · UA</span>
              <span className="info-text vo">{vo}</span>
            </div>
            {caption && (
              <div className="info-row">
                <span className="info-tag">Action</span>
                <span className="info-text" style={{ fontSize: 12, color: 'var(--muted)', fontWeight: 500 }}>{caption}</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* Mini phones used inside frames */
    function PhDashboard() {
      return (
        <div className="ph">
          <div className="scr">
            <div className="notch"/>
            <div className="stat"><span>9:41</span><span>Sergeant</span></div>
            <div className="ph-ttl">Сьогодні</div>
            <div className="ph-sub">Вт · 13 травня</div>
            <div className="ph-hero" style={{ background: 'linear-gradient(135deg, #047857, #0e7490)' }}>
              <div className="l">Денний підсумок</div>
              <div className="v">−₴340</div>
              <div className="c">3 транз. · в межах бюджету</div>
            </div>
            <div className="ph-grid">
              <div className="ph-mod" style={{ background: 'var(--fizruk)' }}><div className="n">Фізрук</div><div className="vv">45 хв</div><div className="cc">Chest day</div></div>
              <div className="ph-mod" style={{ background: 'var(--routine)' }}><div className="n">Рутина</div><div className="vv">14 🔥</div><div className="cc">3 / 4 звичок</div></div>
              <div className="ph-mod" style={{ background: 'var(--nutrition)' }}><div className="n">Їжа</div><div className="vv">1 840</div><div className="cc">ккал · −160</div></div>
              <div className="ph-mod" style={{ background: 'var(--finyk)' }}><div className="n">Фінік</div><div className="vv">₴12K</div><div className="cc">бюджету</div></div>
            </div>
          </div>
        </div>
      );
    }

    function PhFinyk() {
      return (
        <div className="ph" style={{ position: 'relative' }}>
          <div className="scr">
            <div className="notch"/>
            <div className="stat"><span>9:41</span><span>Фінік</span></div>
            <div className="ph-ttl">Транзакції</div>
            <div className="ph-sub">Mono · щойно</div>
            <div className="ph-hero" style={{ background: 'linear-gradient(135deg, #047857, #065f46)' }}>
              <div className="l">Aroma · кава</div>
              <div className="v">−₴89</div>
              <div className="c">авто-категорія · напої</div>
            </div>
            <div className="ph-row" style={{ marginTop: 6 }}><div className="nm">Сільпо</div><div className="v">−₴824</div></div>
            <div className="ph-row"><div className="nm">Uklon</div><div className="v">−₴145</div></div>
            <div className="ph-row"><div className="nm">Зарплата</div><div className="v" style={{ color: 'var(--finyk)' }}>+₴42 800</div></div>
          </div>
          <span className="tap-dot" style={{ top: '32%', left: '38%' }}/>
        </div>
      );
    }

    function PhFizruk() {
      return (
        <div className="ph">
          <div className="scr">
            <div className="notch"/>
            <div className="stat"><span>9:41</span><span>Фізрук</span></div>
            <div className="ph-ttl">Chest Day</div>
            <div className="ph-sub">45 хв · 4.2 т</div>
            <div className="ph-hero" style={{ background: 'linear-gradient(135deg, #0e7490, #134e4a)' }}>
              <div className="l">Жим лежачи · сет 3/4</div>
              <div className="v">85 <span style={{ fontSize: 12, opacity: 0.7 }}>кг × 8</span></div>
              <div className="c">PR ✓ +6 %</div>
            </div>
            <div className="ph-row" style={{ marginTop: 6 }}><div className="nm">Розводка</div><div className="v" style={{ color: 'var(--fizruk)' }}>✓ 22 кг</div></div>

        return '';

        <div className="ph">

            <div className="notch"/>
            <div className="stat"><span>9:41</span><span>Рутина</span></div>
