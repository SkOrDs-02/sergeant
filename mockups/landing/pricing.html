<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <title>Sergeant · Pricing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      --finyk: #047857;
      --finyk-light: #34d399;
      --finyk-soft: #ecfdf5;
      --fizruk: #0e7490;
      --fizruk-light: #22d3ee;
      --routine: #c23a3a;
      --routine-light: #f97066;
      --nutrition: #466212;
      --nutrition-light: #92cc17;

      --bg: #fdf9f3;
      --bg-alt: #faf7f1;
      --surface: #ffffff;
      --border: #ebe4da;
      --border-strong: #d0c8bc;
      --text: #1c1917;
      --text-strong: #0a0a09;
      --muted: #57534e;
      --subtle: #a8a29e;

      --font-sans: "Manrope", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      --font-serif: "Fraunces", serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: var(--font-sans);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "ss01";
    }
    * { box-sizing: border-box; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px;
    }

    /* ── NAV ── */
    nav {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(253,249,243,0.88);
    }
    nav .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lockup {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      padding: 3px;
      background: var(--text-strong);
    }
    .mark span { border-radius: 3px; }
    .mark .a { background: var(--finyk-light); }
    .mark .b { background: var(--fizruk-light); }
    .mark .c { background: var(--routine-light); }
    .mark .d { background: var(--nutrition-light); }
    .wordmark {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -0.025em;
      color: var(--text-strong);
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 36px;
      margin: 0;
      padding: 0;
    }
    nav ul a {
      text-decoration: none;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.005em;
    }
    nav ul a.active { color: var(--text-strong); font-weight: 600; }
    nav .cta {
      background: var(--text-strong);
      color: #faf7f1;
      border: none;
      padding: 11px 18px;
      border-radius: 9999px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.005em;
      cursor: pointer;
    }

    /* ── HERO ── */
    .hero {
      padding: 100px 0 64px;
      text-align: center;
    }
    .hero .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--finyk-soft);
      color: var(--finyk);
      border: 1px solid color-mix(in oklab, var(--finyk) 22%, transparent);
      border-radius: 9999px;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 28px;
    }
    .hero .badge .dot { width: 8px; height: 8px; border-radius: 9999px; background: var(--finyk); }
    .hero h1 {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 84px;
      line-height: 0.98;
      letter-spacing: -0.04em;
      color: var(--text-strong);
      margin: 0 0 24px;
      text-wrap: balance;
    }
    .hero h1 .accent { color: var(--finyk); }
    .hero p {
      font-family: var(--font-sans);
      font-size: 22px;
      line-height: 1.32;
      color: var(--muted);
      max-width: 640px;
      margin: 0 auto;
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    /* ── Toggle ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 40px;
    }
    .toggle {
      display: inline-flex;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 4px;
      gap: 4px;
    }
    .toggle button {
      background: transparent;
      border: none;
      padding: 10px 22px;
      border-radius: 9999px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.005em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .toggle button.on {
      background: var(--text-strong);
      color: #faf7f1;
    }
    .save-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 11px;
      border-radius: 9999px;
      background: var(--routine-light);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* ── PLANS ── */
    .plans {
      padding: 48px 0 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .plan {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      box-shadow: 0 1px 3px rgba(28,25,23,0.04);
    }
    .plan.pro {
      background: var(--text-strong);
      color: #faf7f1;
      border-color: var(--text-strong);
      position: relative;
      overflow: hidden;
    }
    .plan.pro::before {
      content: '';
      position: absolute;
      top: -60%; right: -30%;
      width: 600px; height: 600px;
      background: radial-gradient(closest-side, rgba(52,211,153,0.18), transparent);
      pointer-events: none;
    }

    .plan .ribbon {
      align-self: flex-start;
      padding: 5px 12px;
      border-radius: 9999px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      background: var(--bg-alt);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .plan.pro .ribbon {
      background: var(--finyk);
      color: #fff;
      border-color: var(--finyk);
    }

    .plan h3 {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 56px;
      letter-spacing: -0.035em;
      margin: 0;
      line-height: 1;
      color: var(--text-strong);
    }
    .plan.pro h3 { color: #faf7f1; }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .price {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 84px;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text-strong);
    }
    .plan.pro .price { color: #faf7f1; }
    .price .ccy { font-size: 38px; vertical-align: top; line-height: 1; }
    .price-per {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--muted);
      font-weight: 500;
    }
    .plan.pro .price-per { color: rgba(250,247,241,0.6); }
    .price-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .plan.pro .price-meta { color: rgba(250,247,241,0.55); }

    .plan .blurb {
      font-family: var(--font-sans);
      font-size: 17px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 500;
    }
    .plan.pro .blurb { color: rgba(250,247,241,0.78); }

    .plan ul.feat {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .plan ul.feat li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.4;
      color: var(--text);
      font-weight: 500;
    }
    .plan.pro ul.feat li { color: #faf7f1; }
    .plan ul.feat li::before {
      content: '';
      width: 16px; height: 16px;
      flex-shrink: 0;
      margin-top: 4px;
      border-radius: 6px;
      background: var(--finyk-soft);
      position: relative;
    }
    .plan ul.feat li::after {
      content: '';
      position: absolute;
      left: 4px;
      width: 8px; height: 4px;
      border-left: 2px solid var(--finyk);
      border-bottom: 2px solid var(--finyk);
      transform: rotate(-45deg) translate(0, -2px);
      margin-top: 7px;
    }
    .plan ul.feat li { position: relative; padding-left: 0; }

    .plan .cta-btn {
      align-self: stretch;
      padding: 18px 24px;
      border-radius: 16px;
      border: none;
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.005em;
      cursor: pointer;
      margin-top: auto;
      transition: transform 0.15s ease;
    }
    .plan.free .cta-btn {
      background: var(--bg-alt);
      color: var(--text-strong);
      border: 1px solid var(--border-strong);
    }
    .plan.pro .cta-btn {
      background: var(--finyk-light);
      color: var(--text-strong);
    }
    .plan .cta-foot {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-top: -16px;
    }
    .plan.pro .cta-foot { color: rgba(250,247,241,0.55); }

    /* ── Trust strip ── */
    .trust {
      padding: 48px 0 80px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
    }
    .trust .item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .trust .ic {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--finyk-soft);
      color: var(--finyk);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.02em;
    }
    .trust .ic.two { background: #ecfeff; color: var(--fizruk); }
    .trust .ic.three { background: var(--bg-alt); color: var(--text-strong); border: 1px solid var(--border); }
    .trust h4 {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.015em;
      color: var(--text-strong);
      margin: 4px 0 4px;
    }
    .trust p {
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 500;
      margin: 0;
    }

    /* ── Compare ── */
    section.compare {
      padding: 96px 0 64px;
      border-top: 1px solid var(--border);
    }
    section.compare h2 {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 56px;
      letter-spacing: -0.035em;
      color: var(--text-strong);
      margin: 0 0 16px;
      line-height: 1;
    }
    section.compare .sub {
      font-family: var(--font-sans);
      font-size: 20px;
      color: var(--muted);
      margin: 0 0 48px;
      max-width: 560px;
      line-height: 1.4;
      font-weight: 500;
    }
    .compare-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
    }
    .ctr {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      align-items: center;
      padding: 18px 28px;
      gap: 24px;
      border-bottom: 1px solid var(--border);
    }
    .ctr:last-child { border-bottom: none; }
    .ctr.head {
      background: var(--bg-alt);
      border-bottom: 1.5px solid var(--border-strong);
    }
    .ctr.head .col {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }
    .ctr.head .col.pro { color: var(--finyk); }
    .ctr.section-head {
      background: var(--bg);
      padding: 14px 28px;
    }
    .ctr.section-head .col {
      grid-column: 1 / -1;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-strong);
      font-weight: 700;
    }
    .ctr .feat-name {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--text);
      font-weight: 500;
      letter-spacing: -0.005em;
    }
    .ctr .feat-name small {
      display: block;
      color: var(--subtle);
      font-size: 13px;
      margin-top: 3px;
      font-weight: 400;
    }
    .ctr .v {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .ctr .v.no { color: var(--subtle); }
    .ctr .v.yes { color: var(--finyk); font-weight: 600; }
    .ctr .v.pro-yes { color: var(--finyk); font-weight: 700; }

    /* ── FAQ ── */
    section.faq {
      padding: 96px 0;
      border-top: 1px solid var(--border);
    }
    .faq-row {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 48px;
    }
    .faq-row h2 {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 56px;
      letter-spacing: -0.035em;
      color: var(--text-strong);
      margin: 0;
      line-height: 1;
    }
    .faq-row .sub {
      font-family: var(--font-sans);
      font-size: 18px;
      color: var(--muted);
      margin-top: 18px;
      line-height: 1.45;
      font-weight: 500;
    }
    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .faq-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 26px 28px;
    }
    .faq-item h3 {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 19px;
      letter-spacing: -0.015em;
      color: var(--text-strong);
      margin: 0 0 10px;
    }
    .faq-item p {
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0;
      font-weight: 500;
    }

    /* ── Footer band ── */
    .footer-band {
      background: var(--text-strong);
      color: #faf7f1;
      padding: 80px 0 48px;
      margin-top: 48px;
    }
    .footer-band h2 {
      font-family: var(--font-sans);
      font-weight: 800;
      font-size: 56px;
      letter-spacing: -0.035em;
      margin: 0 0 18px;
      text-wrap: balance;
      line-height: 1;
    }
    .footer-band h2 .accent { color: var(--finyk-light); }
    .footer-band p {
      font-family: var(--font-sans);
      font-size: 20px;
      color: rgba(250,247,241,0.7);
      margin: 0 0 32px;
      max-width: 540px;
      font-weight: 500;
      line-height: 1.4;
    }
    .footer-band .ctas { display: flex; gap: 14px; }
    .footer-band .ctas button {
      padding: 16px 26px;
      border-radius: 9999px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      border: none;
    }
    .footer-band .ctas .primary {
      background: var(--finyk-light);
      color: var(--text-strong);
    }
    .footer-band .ctas .secondary {
      background: rgba(255,255,255,0.08);
      color: #faf7f1;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .footer-band .legal {
      margin-top: 56px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(250,247,241,0.4);
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

          {/* NAV */}

            <div className="container row">

                <span className="mark">
                  <span className="a"/><span className="b"/><span className="c"/><span className="d"/>

              <button className="cta-btn">Почати безкоштовно</button>

            <div className="plan pro">
              <span className="ribbon">Recommended · 7 днів free trial</span>
              <div>
