# Machine-readable registry of autonomous loops operating in this repo.
# Schema is a superset of cobusgreyling/loop-engineering `patterns/registry.yaml`
# (fields: id, name, file, goal, cadence, risk, tools, skills, state, phases,
#  human_gates, starter, week_one_mode, token_cost, cost) with Sergeant-specific
# additions: owner_skill, related_skills, hard_rules_ref, enabled.
#
# cost.* also carries per-run brakes (not in upstream schema, ignored by their
# tooling): max_turns (hard step cap), max_budget_usd (hard per-run $ ceiling),
# circuit_breaker (halt condition on repeated identical tool calls),
# heartbeat_required (dead-man's-switch monitoring for high-risk/high-cadence
# loops). See loop-budget.md § Per-Run Brakes and § Dead-man's Heartbeat for
# rationale and policy.
#
# Compatible with `loop-audit` / `loop-cost` from loop-engineering; the extra
# fields are ignored by their tooling.
#
# Regenerate from .agents/skills/ by running `pnpm skills:lock` followed by a
# catalog sync — do not hand-edit when adding a new skill. Per-run brake
# fields (max_turns/max_budget_usd/circuit_breaker/heartbeat_required) are
# Sergeant policy, not skill-derived — hand-edit those directly.

