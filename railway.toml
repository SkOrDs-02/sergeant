# ⚠️ DEPRECATED (2026-07-12): Railway виведено з експлуатації — бекенд мігровано на
# Hetzner VPS під Coolify (ADR-0074). Цей файл БІЛЬШЕ НЕ використовується для деплою;
# збережений лише тому, що на нього посилаються immutable ADR-0009 / ADR-0024.
# Актуальний деплой: `.github/workflows/deploy-api.yml` → ghcr.io → Coolify.
#
# Деплой API на Railway через Dockerfile.api (без зайвого vite build).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

# Config-as-code для service-level deploy-налаштувань. Раніше ці два поля
# (pre-deploy міграції + health-probe) жили ЛИШЕ у Railway-дашборді; тепер
# джерело істини — цей файл. Railway правило пріоритету: значення, задані у
# config-as-code, завжди перекривають дашборд, але лише для поточного деплою
# (дашборд-стор не мутується). Поля, яких тут НЕМА, беруться з дашборду.
[deploy]
# Pre-deploy job (release-stage міграції). Railway виконує команду через
# `/bin/sh -c "<cmd>"` у тому ж distroless-runtime-образі ще ДО старту
# контейнера — саме тому Dockerfile.api запікає static busybox як `/bin/sh`
# і додає `/nodejs/bin` у PATH (див. коментарі там). Робоча директорія —
# WORKDIR образу (`/app/apps/server`), тож `dist-server/migrate.js` резолвиться
# коректно. ПОТРЕБУЄ env `MIGRATE_DATABASE_URL` (= public DB URL): міграції
# ідуть через публічний Railway-проксі, бо internal-networking на pre-deploy
# стадії ще не піднятий. Якщо міграція впаде — деплой НЕ продовжиться (Railway
# не ретраїть pre-deploy).
preDeployCommand = "node dist-server/migrate.js"
# HTTP health-probe. Distroless без shell-у не може мати Dockerfile HEALTHCHECK,
# тому Railway моніторить контейнер зовнішнім GET на цей шлях і рестартить
# unhealthy-інстанс. `/health` — readiness-аліас (чіпає БД). Timeout у секундах;
# 300 явно дзеркалить Railway-default, щоб не міняти поведінку дашборду.
healthcheckPath = "/health"
healthcheckTimeout = 300
