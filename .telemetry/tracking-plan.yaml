# Target Tracking Plan — Sergeant
# Generated by product-tracking-design-tracking-plan, 2026-05-17

meta:
  product: Sergeant
  version: 1
  created: 2026-05-17
  updated: 2026-05-17
  owner: "@Skords-01"
  product_type: B2C
  destinations: [posthog]
  cdp: none
  pii_policy: traits_only # PII (email/name) lives only in identify() traits, never in event properties
  internal_user_policy: exclude_by_flag # is_internal trait; trackEvent wrapper gates
  naming_convention:
    style: snake_case
    format: object_verb_past_tense # e.g. expense_added, paywall_viewed
    rationale: |
      94 LIVE events already follow this style. Migrating to `object.action`
      dot-notation would break PostHog dashboards (WF-60 growth funnel,
      FTUX dashboards, dozens of saved insights) and lose historical data.
      Lock the existing style as the canonical convention going forward;
      enforce on new events via ESLint rule on ANALYTICS_EVENTS constant.
    new_event_rule: |
      For new events: <object>_<past_tense_verb>. Object first. Multi-word
      objects use underscore (e.g. cross_module_preview_seen). When the
      same object has multiple distinct actions, encode action as a
      property only if "describes the same outcome" (e.g. daily_nudge_action
      with type=primary|dismiss|snooze); otherwise separate event names.

entities:
  user:
    id_property: user_id
    id_format: "Better Auth opaque string (not prefixed; not UUID)"
    distinct_id_strategy: |
      PostHog distinct_id = Better Auth user.id post-login. Pre-login users
      get an anonymous distinct_id; identify() with $anon_distinct_id
      handles stitching automatically.
    traits:
      # Existing
      - {
          name: vibe,
          type: string_array,
          required: false,
          source: localStorage onboarding picks,
          update: on_change,
          pii: false,
        }
      - {
          name: plan,
          type: string_enum,
          required: true,
          values: [free, pro],
          update: on_change,
          pii: false,
        }
      - {
          name: locale,
          type: string,
          required: false,
          max_length: 16,
          source: navigator.language,
          update: on_change,
          pii: false,
        }
      - {
          name: signup_date,
          type: date,
          required: true,
          format: YYYY-MM-DD,
          source: user.createdAt UTC,
          update: once,
          pii: false,
        }

      # NEW — gate
      - {
          name: is_internal,
          type: boolean,
          required: true,
          default: false,
          source: "email domain match (@anthropic.com, @sergeant.app)",
          update: once,
          pii: false,
          purpose: "Filter internal users from product dashboards. trackEvent wrapper skips capture when is_internal=true unless PostHog Debug flag set.",
        }

      # NEW — provider + install
      - {
          name: signup_provider,
          type: string_enum,
          required: false,
          values: [apple, google, email],
          update: once,
          source: AuthContext post-signup,
          pii: false,
        }
      - {
          name: pwa_installed,
          type: boolean,
          required: false,
          update: on_change,
          source: PWA_INSTALLED event handler,
          pii: false,
        }
      - {
          name: app_lock_enabled,
          type: boolean,
          required: false,
          update: on_change,
          source: APP_LOCK_SETUP_COMPLETED / disable flow,
          pii: false,
        }
      - {
          name: biometric_enabled,
          type: boolean,
          required: false,
          update: on_change,
          source: BIOMETRIC_SETUP_COMPLETED,
          pii: false,
        }
      - {
          name: mono_connected,
          type: boolean,
          required: false,
          update: on_change,
          source: BANK_CONNECT_SUCCESS handler,
          pii: false,
        }

      # NEW — snapshot (scheduled)
      - {
          name: streak_current,
          type: integer,
          required: false,
          update: scheduled_daily,
          source: "MAX(consecutive_days) from local sync",
        }
      - {
          name: streak_longest,
          type: integer,
          required: false,
          update: scheduled_daily,
          source: "MAX(streak) historical",
        }
      - {
          name: expenses_count_30d,
          type: integer,
          required: false,
          update: scheduled_daily,
          source: "COUNT(expense WHERE created_at > now-30d)",
        }
      - {
          name: monthly_active_days,
          type: integer,
          required: false,
          update: scheduled_daily,
          source: "DISTINCT_COUNT(day) FROM events last 30d",
        }
      - {
          name: modules_active,
          type: string_array,
          required: false,
          update: scheduled_daily,
          source: "modules with first_action_completed flag",
        }

# No groups — B2C single-user product. user-level tracking only.
groups: []

snapshot_sync:
  cadence: daily
  trigger: cron at server start-of-Kyiv-day (Europe/Kyiv 06:00)
  scope: setPersonProperties (PostHog person update via server posthogCapture wrapper, since no group hierarchy)
  traits:
    - {
        entity: user,
        trait: streak_current,
        source: "local-storage MAX(consecutive_days) reconciled via CloudSync snapshot",
      }
    - { entity: user, trait: streak_longest, source: "historical MAX(streak)" }
    - {
        entity: user,
        trait: expenses_count_30d,
        source: "COUNT(expense) WHERE user_id=$1 AND created_at > now() - interval '30 days'",
      }
    - {
        entity: user,
        trait: monthly_active_days,
        source: "DISTINCT day FROM analytics_event WHERE user_id=$1 AND created_at > now()-30d",
      }
    - {
        entity: user,
        trait: modules_active,
        source: "JSONB module-id list from hub_first_action_completed_v1:<module> KV flags",
      }

  notes: |
    Without an aggregation table on the server, the snapshot job will need
    a server-side counter (PostHog → Postgres mirror, or direct query on
    the source-of-truth tables for expense/workout/etc.). Defer
    implementation until either (a) we adopt PostHog data warehouse, or
    (b) the server gets a tracking-aggregate cron. Stub the traits as
    "not yet populated" until then — design intent is locked.

