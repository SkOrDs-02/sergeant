# ─────────────────────────────────────────────────────────────────────────
# OBSERVABILITY COUPLING (not events — wiring requirements)
# ─────────────────────────────────────────────────────────────────────────
observability_coupling:
  sentry_posthog_user_link:
    requirement: "Sentry.setUser({ id: user.id }) MUST be called on web + mobile + server at the same moment as identifyPostHogUser. Same opaque string."
    why: "PostHog distinct_id and Sentry user.id must match so that crash-to-funnel debugging works (open Sentry issue → see PostHog funnel for affected users without manual ID translation)."
    current_state: server only
  mobile_sentry_init:
    requirement: "@sentry/react-native present in apps/mobile/package.json but no init. Add Sentry.init in App entry and Sentry.setUser in AnalyticsIdentityBridge."
    current_state: missing
  identity_bridge_consolidation:
    requirement: "Mobile has two identity bridges (features/analytics/AnalyticsIdentityBridge.tsx + observability/IdentityBridge.tsx). Pick one as canonical; remove the other."
    current_state: duplicate
  shutdown_flush:
    requirement: "Web: register posthog.capture flush on visibilitychange=hidden (PWA-correct, also handles tab close). Server: SIGTERM hook to flush in-flight POSTs."
    current_state: not_explicit
