# Current State: reverse-engineered from codebase
# Scanned: 2026-05-17
# SDK: PostHog (posthog-js@^1.372.3 web, custom HTTP transport mobile, posthog-node-style direct API server)

meta:
  source_of_truth: packages/shared/src/lib/analyticsEvents.ts
  catalog_size: 94 # event constants defined in ANALYTICS_EVENTS
  live_count: 94 # all defined events have at least one non-test callsite
  orphaned_count: 0
  platforms: [web, mobile, server]
  destinations: [posthog]

sdks:
  web:
    package: posthog-js
    version_range: ^1.372.3
    init: apps/web/src/core/observability/posthog.ts:81
    init_strategy: lazy via requestIdleCallback; buffers up to 100 events pre-init
    autocapture: disabled (custom PageviewTracker — see apps/web/src/core/observability/PageviewTracker.tsx)
    capture_pageview: false # custom tracker to avoid SPA double-fires
    env_keys: [VITE_POSTHOG_KEY, VITE_POSTHOG_HOST]
  mobile:
    package: custom-http-transport
    transport: fetch → ${host}/capture/
    init: apps/mobile/src/lib/observability/posthog.ts (initPostHog)
    distinct_id_persistence: MMKV key "sergeant.mobile.posthog.distinct_id.v1"
    queue_max: 100
    env_keys: [EXPO_PUBLIC_POSTHOG_KEY, EXPO_PUBLIC_POSTHOG_HOST]
  server:
    package: direct-capture
    transport: POST ${host}/capture/ (apps/server/src/lib/posthogCapture.ts)
    fail_open: true # skips if POSTHOG_PROJECT_API_KEY missing
    timeout_ms: 5000
    delete_helper: apps/server/src/lib/posthog.ts (GDPR delete-person via personal API key)
    env_keys: [POSTHOG_PROJECT_API_KEY, POSTHOG_API_KEY, POSTHOG_HOST]

identity:
  identify_calls:
    - location: apps/web/src/core/auth/AuthContext.tsx:307
      wrapper: identifyPostHogUser
      trigger: AuthContext transitions to authenticated
      traits_set: [vibe, plan, locale, signup_date]
    - location: apps/mobile/src/features/analytics/AnalyticsIdentityBridge.tsx:46
      wrapper: identifyPostHogUser
      trigger: useUser hook detects user.id change
      traits_set: [vibe, plan, locale, signup_date]
      notes: lastIdentifiedRef cache prevents duplicate calls
    - location: apps/mobile/src/observability/IdentityBridge.tsx:43
      wrapper: identifyPostHogUser
      trigger: secondary mobile bridge (possible duplicate of AnalyticsIdentityBridge)
      traits_set: [vibe, plan, locale, signup_date]
  reset_calls:
    - location: AuthContext (web) + AnalyticsIdentityBridge (mobile)
      wrapper: resetPostHog
      trigger: logout; mobile re-rolls distinctId (new UUID), clears traits
  group_calls: [] # no posthog.group() / groupIdentify() found in app code
  alias_calls: [] # relies on PostHog auto-merge via $anon_distinct_id

traits:
  schema: apps/web/src/core/observability/identifyTraits.ts (IdentifyTraits interface)
  fields:
    - name: vibe
      type: HubModuleId[]
      source: localStorage onboarding vibe-picks
    - name: plan
      type: '"free" | "pro"'
      source: hard-coded "free" (billing not live)
    - name: locale
      type: string (≤16 chars)
      source: navigator.language (or undefined in non-DOM)
    - name: signup_date
      type: "YYYY-MM-DD UTC"
      source: user.createdAt

pageviews:
  custom_tracker: apps/web/src/core/observability/PageviewTracker.tsx
  reason: PostHog autocapture pageview double-fires on SPA route changes
  mobile_screens: not_implemented # no screen() calls; mobile uses Expo router

sentry_linkage:
  web:
    init: apps/web/src/core/observability/sentry.ts:1
    set_user: not_set # no Sentry.setUser found on web
    user_context_in_events: id-only via beforeSend
  server:
    init: apps/server/src/sentry.ts:1
    set_user: "apps/server/src/auth.ts:517 (Sentry.getCurrentScope?.().setUser({ id: user.id }))"
    user_context_in_events: yes (id-only)
  mobile:
    init: not_present # @sentry/react-native installed but no init file found
    set_user: not_present

