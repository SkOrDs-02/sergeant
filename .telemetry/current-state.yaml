patterns:
  naming_style: snake_case
  naming_format: noun_verb (e.g. expense_added, paywall_viewed) and verb_noun for lifecycle (signup_completed, onboarding_started); occasional verb_in_past_tense (sync_succeeded). Mixed.
  centralized:
    event_names: true # all callsites reference ANALYTICS_EVENTS.* — no inline strings
    transport: true # single trackEvent wrapper per platform (analytics.ts)
  dual_write:
    - apps/web/src/core/observability/dualWriteTelemetry.ts
    - apps/mobile/src/lib/observability/dualWriteTelemetry.ts
    - notes: ring-buffer in localStorage/MMKV (200/100 events) + AI-memory sync sink in addition to PostHog
  product_memory_sync: apps/web/src/core/observability/productMemorySync.ts (forwards subset of events to /recall endpoint)
  error_handling:
    style: fire_and_forget
    catches: try/catch around posthog.capture in wrapper; queue-flushing on init
    blocking: false # no awaited capture calls on critical paths
  shutdown_flush: not_explicit # browser unload not flushed; server has no shutdown hook on posthogCapture
  contracts: inline_comments # payload contracts documented as JSDoc-style comments in analyticsEvents.ts only

hygiene_observations:
  - "Mobile has two identity bridges in different paths: apps/mobile/src/features/analytics/AnalyticsIdentityBridge.tsx and apps/mobile/src/observability/IdentityBridge.tsx — both call identifyPostHogUser with the same trait shape."
  - "Event naming style is mixed: snake_case for all names, but format alternates between subject_verb (expense_added, paywall_viewed), action_object (auth_after_value), and past-tense status (sync_succeeded, signup_completed). No single canonical pattern documented."
  - "Subscription events fire only from server (Stripe webhook handler at apps/server/src/modules/billing/stripe.ts). Web frontend never calls SUBSCRIPTION_STARTED — relies on server emission. Documented intent matches behavior."
  - "Three subscription events have placeholder payload contracts in analyticsEvents.ts comments (SUBSCRIPTION_STARTED, SUBSCRIPTION_CANCELED, SUBSCRIPTION_RENEWED); actual fire-sites in stripe.ts pass a different shape (Stripe object → ANALYTICS_EVENTS payload via captureLifecycle)."
  - "No posthog.group() / groupIdentify() calls anywhere. Better Auth organization scope (if present) is not surfaced to PostHog as a group dimension."
  - "Sentry.setUser called only on server (apps/server/src/auth.ts:517). Web and mobile rely on beforeSend id-only mapping; explicit setUser absent."
  - "Mobile @sentry/react-native is declared in apps/mobile/package.json but no init file (apps/mobile/**/sentry*) found."
  - "Server-side posthogCapture fails open if POSTHOG_PROJECT_API_KEY is missing — silent skip with no log."
  - "Dual-write telemetry (localStorage/MMKV ring buffer + product-memory sync) is parallel to PostHog and has its own consumers (AI memory at /recall). Event volume in PostHog ≠ total instrumented event volume."
  - "Custom PageviewTracker (apps/web/src/core/observability/PageviewTracker.tsx) replaces autocapture pageview to avoid SPA double-fires; mobile has no screen() equivalent."
  - "Payload contracts live as freeform JSDoc-style comments in analyticsEvents.ts; not enforced by types at callsites (trackEvent payload type is Record<string, unknown>)."
