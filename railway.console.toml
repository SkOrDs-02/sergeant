# Railway config-as-code для console-сервісу (`sergeant-openclaw`,
# раніше `sergeant-hubchat` per ADR-0032 / Pain P10).
#
# Цей файл вказується у Railway Service settings → "Config-as-code Path" =
# `railway.console.toml`. API-сервіс (`Sergeant`) використовує дефолтний
# `railway.toml` (Dockerfile.api). Розділення необхідне щоб обидва сервіси
# жили з однієї main-гілки monorepo, але білдились різними Dockerfile-ами.
#
# Див. docs/deploy/console.md для покрокової інструкції створення сервісу
# через Railway GraphQL API.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.console"

[deploy]
# Long-poll grammy-боти не повинні рестартитись на every deploy без причини;
# `ON_FAILURE` дає Railway-у рестартнути тільки якщо процес впав.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
