name: Skill freshness check

# Owner: @SkOrDs-02 (solo maintainer per .github/CODEOWNERS).
# Triage: false-positive runs → close the auto-created issue з коментарем; reopen якщо повторюється > 2x за тиждень.
# Schedule rationale: див. docs/90-work/initiatives/archive/_0009-agent-os-hardening.md § Phase 4 (PR 4.3 audit).

on:
  schedule:
    # Every Monday at 06:00 UTC (09:00 Kyiv)
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - ".agents/skills/**"
      - ".agents/skills-lock.json"
      - "scripts/check-skill-shape.mjs"
      - "scripts/check-skills-lock.mjs"
      - ".github/workflows/skill-freshness.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-skills:
    name: Check skill freshness
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      # Version is read from packageManager in root package.json (pnpm@9.15.1).
      # Must run BEFORE actions/setup-node: setup-node@v5 auto-detects the
      # `packageManager` field in package.json and shells out to `pnpm` during
      # its own run — if pnpm isn't on PATH yet, that step fails outright
      # ("Unable to locate executable file: pnpm") before our `pnpm lint:skills`
      # step even starts.
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Run skill-shape lint + lock-hash verification
        run: pnpm lint:skills

      - name: Warn on unlocked skill directories
        run: |
          UNLOCKED=""
          for dir in .agents/skills/*/; do
            skill=$(basename "$dir")
            if ! python3 -c "
          import json, sys
          data = json.load(open('.agents/skills-lock.json'))
          sys.exit(0 if '$skill' in data.get('skills', {}) else 1)
          " 2>/dev/null; then
              UNLOCKED="$UNLOCKED $skill"
            fi
          done
          if [ -n "$UNLOCKED" ]; then
            echo "::warning::Skill directories not in skills-lock.json:$UNLOCKED"
          fi
