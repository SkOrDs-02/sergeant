name: Visual Regression (Argos)

# Owner: @SkOrDs-02 (solo maintainer per .github/CODEOWNERS).
# Triage: false-positive runs → close the auto-created issue з коментарем; reopen якщо повторюється > 2x за тиждень.
# Schedule rationale: див. docs/90-work/initiatives/archive/_0009-agent-os-hardening.md § Phase 4 (PR 4.3 audit).

# Current trigger: `workflow_dispatch` ONLY (see the temporary-disable
# note below). The PR/push automation is intentionally off until the
# Argos baseline is stabilised. When re-enabled, the design is:
# non-blocking on every PR + push to main — Argos creates its own commit
# status check ("argos/sergeant") rather than gating the PR via `needs:`.
# Reviewers see the visual diff directly in Argos UI and the Checks tab.
#
# Setup: add ARGOS_TOKEN to repository secrets (Settings → Secrets →
# Actions). Get the token from argos-ci.com after linking the repo.
# Without the token the job still runs and saves screenshots locally as
# artifacts, but no diff is computed.

# Temporarily disabled (2026-06-02 — founder decision):
#
# The job has been flaky on every PR and main push for several days,
# producing CI noise that obscures real regressions. Re-enabling the
# automatic triggers (`push: branches: [main]` + `pull_request:`)
# requires one of the following acceptance criteria to be true first:
#
#   1. The current Argos snapshot baseline is bulk-approved (Argos UI →
#      "Approve all" on the latest main) and a re-run produces 0 diffs.
#   2. The snapshot strategy is decomposed — e.g. split per-route, drop
#      animation frames, or move to a stable component-only set.
#   3. A real visual regression is confirmed by manual inspection and
#      fixed in source; the job goes green naturally.
#
# Until then the workflow runs only on `workflow_dispatch` so the
# definition stays maintained and a manual run is one click away.
# See `.github/workflows/visual-regression.yml` history + the
# "Argos snapshot strategy" follow-up in the open-work tracker.
on:
  # Reverted to workflow_dispatch-only until the Argos baseline is
  # bulk-approved in the Argos UI. With no approved baseline every web PR
  # produced a cosmetic red "Visual regression (Argos)" check and burned
  # ~6 min of runner time for zero signal. Re-add the `pull_request` trigger
  # (paths: apps/web/**, packages/design-tokens/**) once a stable 0-diff
  # green baseline exists, and flip `continue-on-error` back to false then.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Visual regression (Argos)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Non-blocking: Argos creates its own commit status ("argos/sergeant");
    # this job may be flaky until the baseline is bulk-approved in Argos UI.
    # Re-enable continue-on-error: false once 0-diff green baseline is stable.
    continue-on-error: true

    services:
      # pgvector/pgvector:pg17 — Postgres 17 + the `vector` extension
      # required by migration 025_ai_memories_pgvector.sql (plain
      # postgres:17-alpine breaks `db:migrate:dev` at boot).
      postgres:
        image: pgvector/pgvector:pg17@sha256:feb68f4f15446397d8cac7f4fe48fe4586de83160d1fc48b46283312d1a33966
        env:
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub
          POSTGRES_DB: hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hub -d hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hub:hub@127.0.0.1:5432/hub
      BETTER_AUTH_SECRET: smoke_test_better_auth_secret_32_chars_min
      AI_QUOTA_DISABLED: "1"
      VITE_API_BASE_URL: http://127.0.0.1:3000
      ALLOWED_ORIGINS: http://127.0.0.1:4173

    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @sergeant/db-schema
        # The server's `dev` script and `db:migrate:dev` import
        # `@sergeant/db-schema/pg`, which the package's `exports` map resolves
        # to `dist/pg/index.js`. Without this build step the import fails
        # with ERR_MODULE_NOT_FOUND at server boot — see waitlistService.ts /
        # drizzle.ts. Cheap (~5s, tsc only) and skips on remote-cache hit.
        run: pnpm --filter @sergeant/db-schema build

      - name: Install Playwright Chromium
        run: pnpm --filter @sergeant/web exec playwright install --with-deps chromium

      - name: Run database migrations
        run: pnpm --filter @sergeant/server db:migrate:dev

      - name: Build web app
        run: pnpm --filter @sergeant/web build

      - name: Start API server
        # Surfaces under test (welcome, hub, finyk, fizruk, …) issue
        # `/api/v1/*` calls during render. Without an upstream the vite
        # preview proxy emits ECONNREFUSED noise that drags page-load past
        # the networkidle timeout and produces flaky screenshots. We
        # background the server here and wait for /health below — same
        # pattern as the critical-flow job in ci.yml.
        run: pnpm --filter @sergeant/server dev &

      - name: Start Vite preview server
        run: pnpm --filter @sergeant/web preview -- --port 4173 --host 127.0.0.1 &

      - name: Wait for servers
        run: |
          echo "Waiting for API server on :3000…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; do sleep 2; done'
          echo "Waiting for preview server on :4173…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:4173 >/dev/null 2>&1; do sleep 2; done'
          echo "Both servers ready."

      # Route matrix (audit archive/2026-05-13-testing-devx-roast.md §P2-3 closeout):
      # `tests/a11y/ds-visual-qa.spec.ts` covers welcome / auth / hub /
      # hub-pre-ftux and the module shells finyk / fizruk / routine /
      # nutrition (via `ALL_FTUX_MODULES`) plus the dedicated `/chat`
      # (hub-chat) surface and the finyk/nutrition first-run variants.
      # Each surface is shot across the full viewport matrix, with the
      # desktop floor (desktop-1280 + desktop-1440) always included — so
      # the §P2-3 "desktop viewport floor" requirement holds for every
      # route. `/fizruk`, `/routine` and `/hub-chat` are therefore already
      # baselined here.
      #
      # Still outstanding: the `/settings` hub surface. It is reached as a
      # BottomNav tab inside the hub (`HubBottomNav` → "Налаштування"),
      # not a standalone `?module=`/path route, so adding it means a new
      # `SURFACES` entry + a tab-click seed step in the spec under
      # `tests/a11y/` — outside this workflow file. Tracked as the
      # remaining §P2-3 follow-up (see open-work "Argos snapshot strategy").
      - name: Run visual regression screenshots
        run: pnpm --filter @sergeant/web test:visual
        env:
          CI: "true"
          # PW_SKIP_WEBSERVER: skip the `vite preview` block in
          # playwright.visual.config.ts — we start it explicitly above so
          # the API server is online before the preview proxy first
          # forwards `/api/v1/*` requests.
          PW_SKIP_WEBSERVER: "1"
          PW_BASE_URL: http://127.0.0.1:4173
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}

      - name: Upload screenshots as artifact (fallback when ARGOS_TOKEN absent)
        if: always()
        # actions/upload-artifact v7.0.0 (SHA-pinned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: visual-regression-screenshots
          path: apps/web/screenshots
          if-no-files-found: ignore
          retention-days: 14
