name: CI

# Owner: @Skords-01 (solo maintainer per .github/CODEOWNERS).
# Triage: false-positive runs → close the auto-created issue з коментарем; reopen якщо повторюється > 2x за тиждень.
# Schedule rationale: див. docs/initiatives/0009-agent-os-hardening.md § Phase 4 (PR 4.3 audit).

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Turborepo remote cache — speeds up turbo tasks across CI runs.
  # Secrets are configured in the repo's GitHub settings; when absent
  # turbo silently falls back to local-only caching (no CI breakage).
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  commitlint:
    name: Commit messages (commitlint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate PR commit messages
        run: pnpm exec commitlint --from "origin/${{ github.base_ref }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      # Version is read from packageManager in root package.json.
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Audit (critical only)
        run: pnpm audit --audit-level=critical --prod

      - name: Audit (high, production)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'audit-exception') }}
        run: pnpm audit --audit-level=high --prod

      - name: Audit full tree (high)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'audit-exception') }}
        run: pnpm audit --audit-level=high

      - name: pnpm overrides single-major guard (L1)
        # Closes hardening card L1
        # (docs/security/hardening/L1-uuid-override.md). Verifies that
        # every range in `package.json -> pnpm.overrides` still resolves
        # to exactly one major across the workspace. Loose ranges like
        # `>=14` silently fail when a future major lands; tight ranges
        # like `^14` keep one copy of the dep in the tree.
        run: pnpm lint:pnpm-overrides

      - name: License policy check (production tree)
        # Validates that every package in the production dependency
        # tree of @sergeant/web + @sergeant/server carries an allowed
        # licence AND that THIRD_PARTY_LICENSES.md reflects the current
        # lockfile. The previous root-level license-checker invocation
        # became a silent no-op after the pnpm-workspace migration —
        # see #516 and scripts/generate-licenses.mjs for the new
        # pipeline (licence allowlist lives in that script so policy
        # changes sit next to the generator they govern).
        run: pnpm licenses:check

      - name: Validate n8n workflow definitions
        run: pnpm ops:n8n:validate

      - name: Governance sync (Hard Rules + Status badges + dangling refs)
        run: pnpm lint:governance-sync

      - name: Hard Rules registry (JSON ↔ AGENTS.md ↔ CONTRIBUTING.md)
        # Validates docs/governance/hard-rules.json against its schema and
        # cross-checks every rule's id+title vs. AGENTS.md `### N. ...` and
        # CONTRIBUTING.md `N. **...**`. Hard Rule #15 — these three move
        # together, so we fail the PR the moment they drift.
        run: pnpm lint:hard-rules-registry

      - name: CODEOWNERS coverage (governance / CI / migrations / skills)
        # Fails if a path the team has flagged as "must require codeowner
        # review" exists in the tree but has no matching rule in
        # .github/CODEOWNERS. Required-coverage list lives at the top of
        # scripts/check-codeowners-coverage.mjs.
        run: pnpm lint:codeowners

      - name: patches/ freshness gate (PR-20 / M4)
        # Fails when patches/*.patch files are not documented in
        # patches/README.md (or rows have empty Owner / Drop-when /
        # Upstream cells), or when pnpm.patchedDependencies in
        # package.json is out of sync with patches/ on disk. Source of
        # truth: scripts/check-patches-doc.mjs.
        run: pnpm lint:patches

      - name: Drizzle schema ↔ SQL migration drift (PR-11)
        # Static analysis: verifies that every table/column in
        # packages/db-schema/src/pg/ is present in the SQL migrations under
        # apps/server/src/migrations/ and vice-versa (for Drizzle-tracked
        # tables). Fails the PR when a SQL migration adds/removes a column
        # without a matching Drizzle schema update, or vice-versa.
        # Intentional divergences → whitelist in scripts/check-schema-drift.mjs.
        run: node scripts/check-schema-drift.mjs

      - name: Discoverability (every role reaches its target in ≤2 hops)
        # Walks the markdown link graph from documented entrypoints
        # (README.md, AGENTS.md, docs/agents/onboarding.md,
        # docs/playbooks/README.md, CONTRIBUTING.md) and asserts that
        # each role/target pair in scripts/check-discoverability.mjs is
        # reachable within the configured hop budget. Closes
        # docs/planning/ai-coding-improvements.md item #3.
        run: pnpm lint:discoverability

      - name: Vercel config drift guard
        # Closes hardening card H7. Vercel reads exactly one vercel.json
        # (whichever lives under the project's Root Directory). A second
        # copy under apps/web/ silently drifts and lets a Vercel UI change
        # swap which security headers protect production. See
        # docs/security/hardening/H7-vercel-config-drift.md and
        # docs/deploy/vercel.md.
        run: bash scripts/check-vercel-config.sh

      - name: security.txt expiry guard
        # Closes hardening card I4. RFC 9116 §2.5.5 requires the Expires
        # field in /.well-known/security.txt to be a valid ISO 8601
        # timestamp in the future. We fail CI when <30 days remain so we
        # always have a buffer to refresh it before researchers treat the
        # file as void.
        run: bash scripts/check-security-txt-expiry.sh

      - name: Format, lint, test, build
        run: pnpm check

      - name: PWA precache 1st-party gate (PR-38 / L11)
        # Reads `apps/server/dist/sw.js` (produced by the build step
        # above) and fails CI if any non-1st-party URL ended up in the
        # PWA precache manifest. Catches the case where a Vite plugin
        # silently inlines a 3rd-party CDN asset into `dist/`.
        # Cache-poisoning + CSP-bypass + GDPR risk all in one go;
        # see docs/initiatives/stack-pulse-2026-05/pr-38-pwa-precache-first-party.md.
        run: pnpm lint:pwa-precache

      - name: Bundle size guard (size-limit)
        run: pnpm --filter @sergeant/web exec size-limit

      - name: Bundle size PR comment
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        # actions/github-script v8.0.0 (SHA-pinned for supply-chain hardening)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const raw = execSync(
              'pnpm --filter @sergeant/web exec size-limit --json',
              { cwd: process.env.GITHUB_WORKSPACE }
            ).toString();
            const results = JSON.parse(raw);
            const rows = results.map(r => {
              const pct = r.limit ? ((r.size / r.limit) * 100).toFixed(1) : '—';
              const status = r.passed !== false ? '✅' : '❌';
              const kb = (r.size / 1024).toFixed(1);
              const limitKb = r.limit ? (r.limit / 1024).toFixed(1) + ' kB' : '—';
              return `| ${status} | \`${r.name}\` | ${kb} kB | ${limitKb} | ${pct}% |`;
            }).join('\n');
            const marker = '<!-- size-limit-report -->';
            const body = [
              marker,
              '## Bundle size',
              '| | Name | Size | Limit | Used |',
              '|---|---|---|---|---|',
              rows,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  web-build-smoke:
    name: Vite build smoke (apps/web)
    runs-on: ubuntu-latest
    # Hard gate that catches Node-only imports leaking into the browser
    # bundle (e.g. `node:fs`, `node:path`) before they reach `main`.
    #
    # Why this gate exists: see
    # docs/audits/2026-05-07-app-audit.md §9 (process gap — `pnpm build`
    # for apps/web wasn't running on PRs, so the umbrella `node:fs`
    # import in kvStoreBoot.ts shipped to prod) and §11.1 (recommendation
    # — add `pnpm --filter @sergeant/web build` as a hard CI gate so
    # regressions of this class fail PR-time, not at deploy/runtime).
    #
    # `pnpm typecheck` and `pnpm test` both pass for this regression
    # class: the imports are typed, and `runMigrations` is mocked in
    # tests. Only the actual Vite production build surfaces the
    # "Module 'node:X' has been externalized for browser compatibility"
    # warning that breaks the page at runtime.
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      # Version is read from packageManager in root package.json.
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build apps/web (Vite)
        # Hard gate. Failure here blocks the PR.
        # Captures stderr+stdout so the next step can grep for the
        # browser-externalized warning and fail on it specifically.
        run: |
          set -o pipefail
          pnpm --filter @sergeant/web build 2>&1 | tee /tmp/web-build.log

      - name: Assert no Node-only imports in browser bundle
        # Bonus targeted regression assertion (audit §11.1). Vite emits
        # `vite-browser-external:node:` shim modules and a runtime
        # "Module 'node:X' has been externalized for browser
        # compatibility" warning whenever Node-only modules (`node:fs`,
        # `node:path`, `node:crypto`, …) leak into the client bundle.
        # We fail the job on either signal so the regression class
        # cannot ship even if Vite kept exit-code 0.
        run: |
          set -euo pipefail
          if grep -q 'vite-browser-external:node:' /tmp/web-build.log; then
            echo "::error::Node built-in module externalized into browser bundle (see audit §1)."
            grep 'vite-browser-external:node:' /tmp/web-build.log || true
            exit 1
          fi
          if grep -q 'has been externalized for browser compatibility' /tmp/web-build.log; then
            echo "::error::Vite externalized a Node-only module for browser compatibility (see audit §1)."
            grep 'has been externalized for browser compatibility' /tmp/web-build.log || true
            exit 1
          fi
          echo "OK: no Node-only imports detected in apps/web bundle."

  coverage:
    name: Test coverage (vitest)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        # apps/server and apps/web enforce per-package floor thresholds in
        # their vitest.config files (~2pp below baseline). A drop below the
        # floor fails this job. Domain packages are already near 100%, so
        # they don't carry explicit floors yet.
        run: pnpm test:coverage

      - name: Upload coverage HTML reports
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: vitest-coverage-html
          path: |
            apps/server/coverage
            apps/web/coverage
            apps/mobile-shell/coverage
            packages/*/coverage
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage JSON summaries
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: vitest-coverage-summary
          path: |
            apps/server/coverage/coverage-summary.json
            apps/web/coverage/coverage-summary.json
            apps/mobile-shell/coverage/coverage-summary.json
            packages/*/coverage/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload coverage to Codecov
        if: always()
        # codecov/codecov-action v4.6.0 (SHA-pinned for supply-chain hardening)
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            apps/server/coverage/coverage-final.json,
            apps/web/coverage/coverage-final.json
          fail_ci_if_error: false
          verbose: false

  a11y:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: check
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @sergeant/web exec playwright install --with-deps chromium

      - name: Run axe accessibility checks
        run: pnpm test:a11y
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: playwright-a11y-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  critical-flow:
    name: Critical-flow E2E (Playwright)
    runs-on: ubuntu-latest
    # No `needs:` — runs in parallel with other jobs so a lint/test failure in
    # `check` never causes this job to be skipped.  Previously `needs: check`
    # was the root cause of the job being skipped on most PRs.
    timeout-minutes: 8

    services:
      # pgvector/pgvector:pg16 — Postgres 16 + the `vector` extension
      # required by migration 025_ai_memories_pgvector.sql. Plain
      # postgres:16-alpine does not ship the extension and breaks
      # `db:migrate:dev` at boot. SHA-pinned for supply-chain hardening
      # (manifest-list digest, multi-arch).
      postgres:
        image: pgvector/pgvector:pg16@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
        env:
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub
          POSTGRES_DB: hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hub -d hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hub:hub@127.0.0.1:5432/hub
      BETTER_AUTH_SECRET: smoke_test_better_auth_secret_32_chars_min
      AI_QUOTA_DISABLED: "1"
      VITE_API_BASE_URL: http://127.0.0.1:3000
      ALLOWED_ORIGINS: http://127.0.0.1:4173

    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @sergeant/db-schema
        # The server's `dev` script and `db:migrate:dev` import
        # `@sergeant/db-schema/pg`, which the package's `exports` map resolves
        # to `dist/pg/index.js`. Without this build step the import fails
        # with ERR_MODULE_NOT_FOUND at server boot — see waitlistService.ts /
        # drizzle.ts. Cheap (~5s, tsc only) and skips on remote-cache hit.
        run: pnpm --filter @sergeant/db-schema build

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm --filter @sergeant/web exec playwright --version | head -1)" >> "$GITHUB_OUTPUT"

      # actions/cache v5.0.5 (SHA-pinned for supply-chain hardening)
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sergeant/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @sergeant/web exec playwright install-deps chromium

      - name: Run database migrations
        run: pnpm --filter @sergeant/server db:migrate:dev

      - name: Build web app
        run: pnpm --filter @sergeant/web build

      - name: Start API server
        run: pnpm --filter @sergeant/server dev &

      - name: Start Vite preview server
        run: pnpm --filter @sergeant/web preview -- --port 4173 --host 127.0.0.1 &

      - name: Wait for servers
        run: |
          echo "Waiting for API server on :3000…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; do sleep 2; done'
          echo "Waiting for preview server on :4173…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:4173 >/dev/null 2>&1; do sleep 2; done'
          echo "Both servers ready."

      - name: Run critical-flow E2E suite
        run: pnpm --filter @sergeant/web exec playwright test -c playwright.smoke.config.ts --grep @critical
        env:
          CI: "true"
          PW_SKIP_WEBSERVER: "1"
          PW_BASE_URL: http://127.0.0.1:4173

      - name: Upload Playwright report
        if: always()
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: playwright-critical-flow-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  tsconfig-strict-guard:
    name: tsconfig strict guard (PR-1.A)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Enforce tsconfig strict inheritance
        run: node tools/tsconfig-guard/check.mjs

  migration-lint:
    name: Migration lint (AGENTS rule #4)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Lint migration files
        run: node scripts/lint-migrations.mjs
        env:
          BASE_REF: ${{ github.base_ref }}

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action v2.3.9 (SHA-pinned for supply-chain hardening)
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Catches GitHub Actions YAML mistakes that GitHub silently fails on
    # (e.g. `secrets` context in `jobs.<job_id>.if`, which makes the entire
    # workflow file invalid and prevents schedule cron triggers from firing).
    # actionlint runs locally — no network calls beyond the binary download.
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install actionlint v1.7.7 (checksum-pinned)
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=1.7.7
          ACTIONLINT_SHA256=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Lint .github/workflows
        # `-ignore` filters out shellcheck info/style noise from existing run
        # scripts (SC2012, SC2016, SC2129 …) so the gate stays focused on
        # workflow-schema and expression errors — e.g. the `secrets` context
        # in `jobs.<job_id>.if` that caused this PR. shellcheck `error`/
        # `warning` levels still fail the job.
        run: |
          actionlint -color \
            -ignore 'shellcheck reported issue in this script: SC[0-9]+:(info|style):'

  pipeline-duration-summary:
    name: Pipeline duration (p95 trend)
    runs-on: ubuntu-latest
    # Run after all main jobs; report even when some fail.
    needs: [check, coverage, a11y, critical-flow]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Compute pipeline duration metrics
        id: metrics
        run: node scripts/ci/pipeline-duration-p95.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post or update PR comment
        # Only on pull_request events from the same repo (not forks).
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        # actions/github-script v8.0.0 (SHA-pinned for supply-chain hardening)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- ci-pipeline-duration-summary -->';
            const body = `${process.env.REPORT_BODY}`;
            if (!body || !body.includes(marker)) {
              console.log('No report body found, skipping comment.');
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new comment');
            }
        env:
          REPORT_BODY: ${{ steps.metrics.outputs.markdown }}
