name: CI

# Owner: @SkOrDs-02 (solo maintainer per .github/CODEOWNERS).
# Triage: false-positive runs → close the auto-created issue з коментарем; reopen якщо повторюється > 2x за тиждень.
# Schedule rationale: див. docs/90-work/initiatives/archive/_0009-agent-os-hardening.md § Phase 4 (PR 4.3 audit).

# Audit 2026-06-11 ws-11: bare `push:` + `pull_request:` ran the full
# 14-job pipeline TWICE for every push to a PR branch (different
# concurrency groups: refs/heads/* vs refs/pull/*/merge) — double the
# Actions minutes and queue latency for a solo maintainer. PR branches
# now run only via pull_request (merge-ref, what actually lands); pushes
# build only on main.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Turborepo remote cache — speeds up turbo tasks across CI runs.
  # Secrets are configured in the repo's GitHub settings; when absent
  # turbo silently falls back to local-only caching (no CI breakage).
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  commitlint:
    name: Commit messages (commitlint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate PR commit messages
        run: pnpm exec commitlint --from "origin/${{ github.base_ref }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      # Version is read from packageManager in root package.json.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Ledger-backed audit gate. Replaces the old blunt `audit-exception`
      # PR-label (which suppressed *every* high advisory at once) with a
      # per-advisory allowlist read from
      # docs/04-governance/security/audit-exceptions.md. Critical advisories
      # always block — there is no ledger escape for them. High/moderate
      # advisories pass only with a dated, non-expired ledger entry.
      # See scripts/ci/audit-exceptions.mjs.
      - name: Audit (production, ledger-gated)
        run: node scripts/ci/audit-exceptions.mjs --prod

      - name: Audit (full tree, ledger-gated)
        run: node scripts/ci/audit-exceptions.mjs

      - name: pnpm overrides single-major guard (L1)
        # Closes hardening card L1
        # (docs/04-governance/security/hardening/L1-uuid-override.md). Verifies that
        # every range in `package.json -> pnpm.overrides` still resolves
        # to exactly one major across the workspace. Loose ranges like
        # `>=14` silently fail when a future major lands; tight ranges
        # like `^14` keep one copy of the dep in the tree.
        run: pnpm lint:pnpm-overrides

      - name: pnpm dedupe drift guard (P2-1)
        # Closes audit item P2-1 in
        # docs/90-work/audits/archive/2026-05-13-testing-devx-roast.md. `pnpm install`
        # without `--frozen-lockfile` can silently introduce duplicate
        # copies of a transitive dep when the lockfile drifts (e.g. a
        # local `pnpm add` resolves a newer compatible version that the
        # rest of the tree can also satisfy). `pnpm dedupe --check`
        # exits non-zero when the lockfile is not minimal; the fix is to
        # run `pnpm dedupe` locally and commit the lockfile delta.
        run: pnpm dedupe --check

      - name: CI dedupe-gate shape regression test (P2-1)
        # Unit-tests for the dedupe gate above: asserts the step exists
        # in this `check` job, runs `pnpm dedupe --check`, and is fail-
        # stop (no `continue-on-error: true` / `|| true` escape). Cheap
        # parser-level guard so an accidental config refactor cannot
        # silently drop the gate. Source:
        # scripts/__tests__/ci-dedupe-gate.test.mjs.
        run: node --test scripts/__tests__/ci-dedupe-gate.test.mjs

      - name: License policy check (production tree)
        # Validates that every package in the production dependency
        # tree of @sergeant/web + @sergeant/server carries an allowed
        # licence AND that THIRD_PARTY_LICENSES.md reflects the current
        # lockfile. The previous root-level license-checker invocation
        # became a silent no-op after the pnpm-workspace migration —
        # see #516 and scripts/generate-licenses.mjs for the new
        # pipeline (licence allowlist lives in that script so policy
        # changes sit next to the generator they govern).
        run: pnpm licenses:check

      - name: Validate n8n workflow definitions
        run: pnpm ops:n8n:validate

      - name: Governance sync (Hard Rules + Status badges + dangling refs)
        run: pnpm lint:governance-sync

      - name: Hard Rules registry (JSON ↔ AGENTS.md ↔ CONTRIBUTING.md)
        # Validates docs/04-governance/governance/hard-rules.json against its schema and
        # cross-checks every rule's id+title vs. AGENTS.md `### N. ...` and
        # CONTRIBUTING.md `N. **...**`. Hard Rule #15 — these three move
        # together, so we fail the PR the moment they drift.
        run: pnpm lint:hard-rules-registry

      - name: CODEOWNERS coverage (governance / CI / migrations / skills)
        # Fails if a path the team has flagged as "must require codeowner
        # review" exists in the tree but has no matching rule in
        # .github/CODEOWNERS. Required-coverage list lives at the top of
        # scripts/check-codeowners-coverage.mjs.
        run: pnpm lint:codeowners

      - name: patches/ freshness gate (PR-20 / M4)
        # Fails when patches/*.patch files are not documented in
        # patches/README.md (or rows have empty Owner / Drop-when /
        # Upstream cells), or when pnpm.patchedDependencies in
        # package.json is out of sync with patches/ on disk. Source of
        # truth: scripts/check-patches-doc.mjs.
        run: pnpm lint:patches

      - name: HTML SRI gate for apps/web/index.html (audit § S3)
        # Closes audit-item S3 from
        # docs/90-work/audits/2026-05-13-security-observability-roast.md.
        # Fails CI if `apps/web/index.html` adds a
        # `<script src="https://...">` without `integrity="sha384-..."`
        # + `crossorigin="anonymous"`. Supply-chain hardening: any
        # cross-origin script without SRI is silent XSS-on-CDN-compromise.
        run: pnpm lint:html-sri

      - name: HTML SRI gate — unit tests
        # Companion unit tests for the SRI linter (BAD/GOOD fixtures
        # + apps/web/index.html guard). Kept separate so a fixture-only
        # regression fails noisily before `pnpm check` runs the whole
        # turbo matrix.
        run: node --test scripts/__tests__/lint-html-sri.test.mjs

      - name: Drizzle schema ↔ SQL migration drift (PR-11)
        # Static analysis: verifies that every table/column in
        # packages/db-schema/src/pg/ is present in the SQL migrations under
        # apps/server/src/migrations/ and vice-versa (for Drizzle-tracked
        # tables). Fails the PR when a SQL migration adds/removes a column
        # without a matching Drizzle schema update, or vice-versa.
        # Intentional divergences → whitelist in scripts/check-schema-drift.mjs.
        run: node scripts/check-schema-drift.mjs

      - name: Discoverability (every role reaches its target in ≤2 hops)
        # Walks the markdown link graph from documented entrypoints
        # (README.md, AGENTS.md, docs/00-start/agents/onboarding.md,
        # docs/00-start/playbooks/README.md, CONTRIBUTING.md) and asserts that
        # each role/target pair in scripts/check-discoverability.mjs is
        # reachable within the configured hop budget. Closes
        # docs/90-work/planning/ai-coding-improvements.md item #3.
        run: pnpm lint:discoverability

      - name: Vercel config drift guard
        # Closes hardening card H7. Vercel reads exactly one vercel.json
        # (whichever lives under the project's Root Directory). A second
        # copy under apps/web/ silently drifts and lets a Vercel UI change
        # swap which security headers protect production. See
        # docs/04-governance/security/hardening/H7-vercel-config-drift.md and
        # docs/03-operations/deploy/vercel.md.
        run: bash scripts/check-vercel-config.sh

      - name: security.txt expiry guard
        # Closes hardening card I4. RFC 9116 §2.5.5 requires the Expires
        # field in /.well-known/security.txt to be a valid ISO 8601
        # timestamp in the future. We fail CI when <30 days remain so we
        # always have a buffer to refresh it before researchers treat the
        # file as void.
        run: bash scripts/check-security-txt-expiry.sh

      - name: Lifecycle marker coverage (Hard Rule #10 — non-blocking)
        # Theme 4 (consolidated audit 2026-05-13): checks that apps/web/src/**/*.{ts,tsx}
        # files carry a lifecycle marker (/** @status Active */ or equivalent).
        # Non-blocking during burn-down (exits 0 even with violations); promoted
        # to --fail-on-violations once coverage reaches 100%.
        # See docs/90-work/audits/archive/2026-05-13-consolidated-page-audit.md § Theme 4 and
        # docs/04-governance/governance/rules/10-lifecycle-markers.md.
        run: node scripts/docs/check-lifecycle-markers.mjs
        continue-on-error: true

      - name: Format, lint, test, build
        # Tee full output so the node-import gate below can grep Vite
        # browser-externalization warnings from the @sergeant/web build
        # phase without a duplicate `web-build-smoke` job (audit §11.1).
        # `check:ci` skips @sergeant/mobile jest — web-focus phase; mobile
        # tests still run locally via `pnpm check`.
        run: |
          set -o pipefail
          pnpm check:ci 2>&1 | tee /tmp/check-build.log

      - name: Assert no Node-only imports in browser bundle
        # Merged from the former `web-build-smoke` job. Vite emits
        # `vite-browser-external:node:` shim modules and a runtime
        # "Module 'node:X' has been externalized for browser
        # compatibility" warning whenever Node-only modules leak into
        # the client bundle. `pnpm typecheck` / unit tests do not
        # surface this regression class — only the production build does.
        run: |
          set -euo pipefail
          if grep -q 'vite-browser-external:node:' /tmp/check-build.log; then
            echo "::error::Node built-in module externalized into browser bundle (see audit §1)."
            grep 'vite-browser-external:node:' /tmp/check-build.log || true
            exit 1
          fi
          if grep -q 'has been externalized for browser compatibility' /tmp/check-build.log; then
            echo "::error::Vite externalized a Node-only module for browser compatibility (see audit §1)."
            grep 'has been externalized for browser compatibility' /tmp/check-build.log || true
            exit 1
          fi
          echo "OK: no Node-only imports detected in apps/web bundle."

      - name: TODO freshness gate
        # Fails CI if any TODO/FIXME/HACK/XXX comments have expired deadlines
        # or are missing deadlines for tech-debt items. Format:
        # TODO(T5-feature): 2026-07-15 — description
        # See scripts/check-todo-freshness.mjs for implementation details.
        run: pnpm lint:todo-freshness

      - name: PWA precache 1st-party gate (PR-38 / L11)
        # Reads `apps/server/dist/sw.js` (produced by the build step
        # above) and fails CI if any non-1st-party URL ended up in the
        # PWA precache manifest. Catches the case where a Vite plugin
        # silently inlines a 3rd-party CDN asset into `dist/`.
        # Cache-poisoning + CSP-bypass + GDPR risk all in one go;
        # see docs/90-work/initiatives/stack-pulse-2026-05/pr-38-pwa-precache-first-party.md.
        run: pnpm lint:pwa-precache

      - name: Bundle size guard (size-limit)
        run: pnpm --filter @sergeant/web exec size-limit

      - name: Bundle size PR comment
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        # actions/github-script v8.0.0 (SHA-pinned for supply-chain hardening)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const raw = execSync(
              'pnpm --filter @sergeant/web exec size-limit --json',
              { cwd: process.env.GITHUB_WORKSPACE }
            ).toString();
            const results = JSON.parse(raw);
            const rows = results.map(r => {
              const pct = r.limit ? ((r.size / r.limit) * 100).toFixed(1) : '—';
              const status = r.passed !== false ? '✅' : '❌';
              const kb = (r.size / 1024).toFixed(1);
              const limitKb = r.limit ? (r.limit / 1024).toFixed(1) + ' kB' : '—';
              return `| ${status} | \`${r.name}\` | ${kb} kB | ${limitKb} | ${pct}% |`;
            }).join('\n');
            const marker = '<!-- size-limit-report -->';
            const body = [
              marker,
              '## Bundle size',
              '| | Name | Size | Limit | Used |',
              '|---|---|---|---|---|',
              rows,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  knip-scan:
    name: Dead Code (Knip)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run Knip (dead code detection)
        # Fails CI if unused exports, files, or dependencies are detected.
        # Configuration lives in knip.json at the repo root.
        # See docs/00-start/playbooks/cleanup-dead-code.md for lifecycle marker
        # guards that must be applied before deleting any Knip finding.
        run: pnpm knip

  coverage:
    name: Test coverage (vitest)
    runs-on: ubuntu-latest
    permissions:
      # contents: write — потрібен КРОКУ «Push coverage-ratchet baseline bump»,
      # який комітить піднятий baseline назад у PR-гілку (same-repo PRs only).
      contents: write
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        # apps/server and apps/web enforce per-package floor thresholds in
        # their vitest.config files (~2pp below baseline). A drop below the
        # floor fails this job. Domain packages are already near 100%, so
        # they don't carry explicit floors yet.
        # `test:coverage:ci` skips @sergeant/mobile jest — web-focus phase.
        run: pnpm test:coverage:ci

      - name: Check coverage threshold (≥75%)
        # Fails CI if any workspace drops below its floor.
        # Floors live in coverage-thresholds.json (single source of truth) —
        # the same file is read by the workspace vitest/jest configs, so the
        # local `pnpm test:coverage` run and this gate can't drift apart.
        # Raise floors in that JSON as coverage improves.
        run: |
          set -euo pipefail
          FAILED=0

          for summary in apps/*/coverage/coverage-summary.json packages/*/coverage/coverage-summary.json; do
            if [ ! -f "$summary" ]; then
              continue
            fi

            WORKSPACE=$(echo "$summary" | sed 's|/coverage/coverage-summary.json||')
            # Web-focus phase: @sergeant/mobile jest is out of CI scope.
            if [ "$WORKSPACE" = "apps/mobile" ]; then
              echo "⏭️  $WORKSPACE: skipped (mobile excluded from CI gates)"
              continue
            fi
            WS_THRESHOLD=$(jq -r --arg ws "$WORKSPACE" '.workspaces[$ws] // .default' coverage-thresholds.json)
            COVERAGE=$(jq -r '.total.lines.pct' "$summary")

            if [ "$COVERAGE" = "null" ] || [ -z "$COVERAGE" ]; then
              echo "⚠️  $WORKSPACE: no coverage data found"
              continue
            fi

            if (( $(echo "$COVERAGE < $WS_THRESHOLD" | bc -l) )); then
              echo "❌ $WORKSPACE: ${COVERAGE}% (below ${WS_THRESHOLD}%)"
              FAILED=1
            else
              echo "✅ $WORKSPACE: ${COVERAGE}% (floor: ${WS_THRESHOLD}%)"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Coverage gate failed: one or more workspaces below their floor threshold"
            exit 1
          fi

          echo ""
          echo "✅ All workspaces meet their coverage floor threshold"

      - name: Coverage ratchet — unit tests
        # Cheap pre-flight (same pattern as the dedupe-gate / SRI-gate tests):
        # validates evaluateRatchet/applyBumps so a broken helper fails fast
        # before the gate below decides the PR's fate.
        run: node --test scripts/ci/__tests__/coverage-ratchet.test.mjs

      - name: Coverage ratchet (apps/web + apps/server)
        # Ratchet-гейт «не гірше ніж зараз» поверх статичних floors вище:
        # baseline живе у coverage-ratchet.json (repo root). Падає, якщо
        # total.lines.pct workspace-у нижче baseline − 0.5пп; коли покриття
        # зросло — переписує baseline у робочому дереві (наступний крок
        # комітить bump у PR-гілку). Гейт свідомо живе ТІЛЬКИ в CI: локальний
        # повний suite на Windows флакі, жоден локальний скрипт це не викликає.
        # Читає coverage/coverage-summary.json — turbo-output test:coverage,
        # тому cache-hit replay віддає ті самі числа (кеш не ламається).
        run: node scripts/ci/coverage-ratchet.mjs

      - name: Push coverage-ratchet baseline bump
        # Only same-repo PRs: fork PRs get a read-only GITHUB_TOKEN, and on
        # push-to-main runs head.ref не існує. Пуш ботом із GITHUB_TOKEN не
        # тригерить новий CI-ран (GitHub-механіка) — циклу немає.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if git diff --quiet -- coverage-ratchet.json; then
            echo "Baseline unchanged — nothing to push."
            exit 0
          fi
          cp coverage-ratchet.json /tmp/coverage-ratchet.json
          git checkout -- coverage-ratchet.json
          git fetch origin "$HEAD_REF"
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"
          cp /tmp/coverage-ratchet.json coverage-ratchet.json
          if git diff --quiet -- coverage-ratchet.json; then
            echo "Head branch already carries this baseline."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage-ratchet.json
          git commit -m "chore(ci): ratchet coverage baseline upward"
          # Best-effort: сам gate вже пройшов зеленим. Rejected/transient push
          # (напр. гілка зрушила між checkout і push) не має валити coverage-job —
          # bump під'їде наступним раном. Лишаємо WARNING і виходимо 0.
          if ! git push origin "$HEAD_REF"; then
            echo "::warning::coverage-ratchet baseline bump push failed; gate stays green, bump retries next run."
            exit 0
          fi

      - name: Upload coverage HTML reports
        if: always()
        # actions/upload-artifact v7.0.0 (SHA-pinned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vitest-coverage-html
          path: |
            apps/server/coverage
            apps/web/coverage
            apps/mobile-shell/coverage
            packages/*/coverage
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage JSON summaries
        if: always()
        # actions/upload-artifact v7.0.0 (SHA-pinned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vitest-coverage-summary
          path: |
            apps/server/coverage/coverage-summary.json
            apps/web/coverage/coverage-summary.json
            apps/mobile-shell/coverage/coverage-summary.json
            packages/*/coverage/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 30

  a11y:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: check
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @sergeant/web exec playwright install --with-deps chromium

      - name: Run axe accessibility checks
        run: pnpm test:a11y
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        # actions/upload-artifact v7.0.0 (SHA-pinned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-a11y-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  critical-flow:
    name: Critical-flow E2E (Playwright)
    runs-on: ubuntu-latest
    # No `needs:` — runs in parallel with other jobs so a lint/test failure in
    # `check` never causes this job to be skipped.  Previously `needs: check`
    # was the root cause of the job being skipped on most PRs.
    timeout-minutes: 8

    services:
      # pgvector/pgvector:pg17 — Postgres 17 + the `vector` extension
      # required by migration 025_ai_memories_pgvector.sql. Plain
      # postgres:17-alpine does not ship the extension and breaks
      # `db:migrate:dev` at boot. SHA-pinned for supply-chain hardening
      # (manifest-list digest, multi-arch).
      postgres:
        image: pgvector/pgvector:pg17@sha256:feb68f4f15446397d8cac7f4fe48fe4586de83160d1fc48b46283312d1a33966
        env:
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub
          POSTGRES_DB: hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hub -d hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hub:hub@127.0.0.1:5432/hub
      BETTER_AUTH_SECRET: smoke_test_better_auth_secret_32_chars_min
      AI_QUOTA_DISABLED: "1"
      VITE_API_BASE_URL: http://127.0.0.1:3000
      ALLOWED_ORIGINS: http://127.0.0.1:4173

    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @sergeant/db-schema
        # The server's `dev` script and `db:migrate:dev` import
        # `@sergeant/db-schema/pg`, which the package's `exports` map resolves
        # to `dist/pg/index.js`. Without this build step the import fails
        # with ERR_MODULE_NOT_FOUND at server boot — see waitlistService.ts /
        # drizzle.ts. Cheap (~5s, tsc only) and skips on remote-cache hit.
        run: pnpm --filter @sergeant/db-schema build

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm --filter @sergeant/web exec playwright --version | head -1)" >> "$GITHUB_OUTPUT"

      # actions/cache v5.0.5 (SHA-pinned for supply-chain hardening)
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sergeant/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @sergeant/web exec playwright install-deps chromium

      - name: Run database migrations
        run: pnpm --filter @sergeant/server db:migrate:dev

      - name: Build web app
        run: pnpm --filter @sergeant/web build

      - name: Start API server
        run: pnpm --filter @sergeant/server dev &

      - name: Start Vite preview server
        run: pnpm --filter @sergeant/web preview -- --port 4173 --host 127.0.0.1 &

      - name: Wait for servers
        run: |
          echo "Waiting for API server on :3000…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; do sleep 2; done'
          echo "Waiting for preview server on :4173…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:4173 >/dev/null 2>&1; do sleep 2; done'
          echo "Both servers ready."

      - name: Run critical-flow E2E suite
        # Scope to chromium only: this job installs just chromium
        # (`playwright install … chromium` above), while the smoke config also
        # declares webkit + mobile-safari projects. Without --project those
        # engines run too and fail with "Executable doesn't exist …/webkit-*"
        # on any Playwright-browser cache miss. webkit/mobile-safari coverage
        # lives in extended-e2e.yml (nightly + `extended-e2e` label), per the
        # note in playwright.smoke.config.ts. chromium depends on `setup`, so
        # the auth-state project still runs automatically.
        run: pnpm --filter @sergeant/web exec playwright test -c playwright.smoke.config.ts --project=chromium --grep @critical
        env:
          CI: "true"
          PW_SKIP_WEBSERVER: "1"
          PW_BASE_URL: http://127.0.0.1:4173

      - name: Upload Playwright report
        if: always()
        # actions/upload-artifact v7.0.0 (SHA-pinned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-critical-flow-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  server-integration:
    name: Server integration tests (Testcontainers)
    runs-on: ubuntu-latest
    # No `needs:` — runs in parallel with other jobs (same rationale as
    # critical-flow). Audit 2026-06-11 ws-04: this tier — the syncV2
    # correctness suite (LWW conflicts, tombstones, PN-counters) and the
    # session-protection route-auth guard — previously ran NOWHERE:
    # `test:integration` had zero references across all workflows, and the
    # default vitest config excludes *.integration.test.ts. The suites
    # hard-fail (instead of silently skipping) when Docker is unavailable
    # under CI=true, so a runner without Docker cannot green-light this job.
    timeout-minutes: 20
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @sergeant/db-schema
        # apps/server/src/drizzle.ts imports `@sergeant/db-schema/pg`, which
        # the package's exports map resolves to dist/ — without this build the
        # session-protection and transcribe suites die at import with
        # ERR_MODULE_NOT_FOUND (same step exists in critical-flow).
        run: pnpm --filter @sergeant/db-schema build

      - name: Run server integration suite
        run: pnpm --filter @sergeant/server test:integration

  openclaw-config-schema:
    # Validates ops/openclaw/openclaw.example.json against the real openclaw
    # runtime config schema. Catches the class of drift that Stage 5a hit in
    # May 2026: TypeScript types in plugin-sdk/*.d.ts suggested
    # `agents.<id>.tools` was valid, but the zod-backed runtime schema rejects
    # it ("Unrecognized keys: cofounder, eng, ..."), which crashed the
    # gateway in production. The plugin-level config-gate.test.ts checks
    # mapping consistency but cannot validate against the real schema —
    # this CI job runs `openclaw config validate --json` to close the gap.
    # Pins openclaw to the version in Dockerfile.openclaw-gateway.
    name: OpenClaw config schema (real runtime validate)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      # openclaw 5.7 requires Node >=22.14 — pin to 22.19 (LTS).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.19"

      - name: Validate openclaw.example.json against runtime schema
        run: node scripts/validate-openclaw-config.mjs

  migration-lint:
    name: Migration lint (AGENTS rule #4)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Lint migration files
        run: node scripts/lint-migrations.mjs
        env:
          BASE_REF: ${{ github.base_ref }}

  migration-down-drill:
    name: Migration down drill (AGENTS rule #4)
    # PR-32 (`docs/90-work/planning/archive/pr-plan-2026-05.md`). Static lint above guarantees
    # sequential numbering + two-phase DROP, but down-migrations themselves
    # are not validated by the linter — they could `DROP COLUMN` a column
    # that no longer exists or forget a sequence created in the up, and the
    # bug only surfaces during an emergency local rollback. This job runs
    # `scripts/migration-down-drill.mjs` against a fresh pgvector container:
    # apply all ups → apply every `.down.sql` in reverse → re-apply all ups
    # → fingerprint-compare the two end states. Any drift fails the build.
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      # Same image as `critical-flow` / `coverage` — migration 025 needs
      # pgvector, and SHA-pinning matches docker-compose.yml so local +
      # CI drills run against an identical binary.
      postgres:
        image: pgvector/pgvector:pg17@sha256:feb68f4f15446397d8cac7f4fe48fe4586de83160d1fc48b46283312d1a33966
        env:
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub
          POSTGRES_DB: hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hub -d hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hub:hub@127.0.0.1:5432/hub

    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        # `pg` is hoisted to the workspace root via pnpm — the drill script
        # at `scripts/migration-down-drill.mjs` resolves it from
        # `node_modules/pg` without a workspace filter.
        run: pnpm install --frozen-lockfile

      - name: Pure-helper unit tests
        # Cheap pre-flight: validates `downCompanion` / `diffSnapshots` so
        # a broken helper fails fast before we spin up the integration drill.
        run: node --test scripts/__tests__/migration-down-drill.test.mjs

      - name: Run migration down drill
        run: pnpm db:drill:down

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action v2.3.9 (SHA-pinned for supply-chain hardening)
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Catches GitHub Actions YAML mistakes that GitHub silently fails on
    # (e.g. `secrets` context in `jobs.<job_id>.if`, which makes the entire
    # workflow file invalid and prevents schedule cron triggers from firing).
    # actionlint runs locally — no network calls beyond the binary download.
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install actionlint v1.7.7 (checksum-pinned)
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=1.7.7
          ACTIONLINT_SHA256=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Lint .github/workflows
        # `-ignore` filters out shellcheck info/style noise from existing run
        # scripts (SC2012, SC2016, SC2129 …) so the gate stays focused on
        # workflow-schema and expression errors — e.g. the `secrets` context
        # in `jobs.<job_id>.if` that caused this PR. shellcheck `error`/
        # `warning` levels still fail the job.
        run: |
          actionlint -color \
            -ignore 'shellcheck reported issue in this script: SC[0-9]+:(info|style):'

  pipeline-duration-summary:
    name: Pipeline duration (p95 trend)
    runs-on: ubuntu-latest
    # Run after all main jobs; report even when some fail.
    needs: [check, coverage, a11y, critical-flow]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Compute pipeline duration metrics
        id: metrics
        run: node scripts/ci/pipeline-duration-p95.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post or update PR comment
        # Only on pull_request events from the same repo (not forks).
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        # actions/github-script v8.0.0 (SHA-pinned for supply-chain hardening)
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- ci-pipeline-duration-summary -->';
            const body = `${process.env.REPORT_BODY}`;
            if (!body || !body.includes(marker)) {
              console.log('No report body found, skipping comment.');
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new comment');
            }
        env:
          REPORT_BODY: ${{ steps.metrics.outputs.markdown }}
