name: Mutation testing

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  shared-utils:
    name: shared utils tier-1
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9.15.1

      - name: Setup Node
        # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run Stryker shared utils tier-1
        env:
          TZ: Europe/Kyiv
        run: pnpm --filter @sergeant/shared mutation:utils

      - name: Upload mutation report
        if: always()
        # actions/upload-artifact v7.0.0 (SHA-pinned for supply-chain hardening)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: shared-utils-mutation-report
          path: |
            packages/shared/reports/mutation/utils/index.html
            packages/shared/reports/mutation/utils/mutation-report.json
          if-no-files-found: warn
          retention-days: 30
