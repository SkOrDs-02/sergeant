name: Mutation testing (Stryker)

# Mutation testing на критичних модулях. Не на кожен PR (~3 хв на 109 мутантів
# для cloudSync), а:
#   - workflow_dispatch (ручний запуск з конкретним config-ом),
#   - щотижневий schedule (понеділок 04:00 UTC = 06:00 Київ),
#   - PR-и, що чіпають mutated-файли (paths-фільтр).
# Threshold у конфігах: high=80 / low=70 / break=60. Падіння break → CI fails.
# Roadmap-довідник: docs/diagnostics/2026-05-03-web-deep-dive item #17.
# Документація: docs/testing/mutation.md.

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      config:
        description: "Stryker config to run (relative to apps/web)"
        required: false
        default: "stryker.cloudSync.conf.json"
  pull_request:
    paths:
      - "apps/web/src/core/cloudSync/conflict/**"
      - "apps/web/stryker.cloudSync.conf.json"
      - ".github/workflows/mutation-testing.yml"

permissions:
  contents: read

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloudSync:
    name: cloudSync conflict-resolver
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run Stryker (cloudSync conflict-resolver)
        working-directory: apps/web
        run: |
          CONFIG="${{ github.event.inputs.config || 'stryker.cloudSync.conf.json' }}"
          echo "Running Stryker config: $CONFIG"
          pnpm exec stryker run "$CONFIG"

      # actions/upload-artifact v5.0.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        if: always()
        with:
          name: stryker-cloudSync-report
          path: |
            apps/web/reports/mutation/**
            apps/web/stryker-reports/**
          retention-days: 14
          if-no-files-found: ignore
