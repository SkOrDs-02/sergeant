name: Extended E2E (nightly)

# Owner: @SkOrDs-02 (solo maintainer per .github/CODEOWNERS).
# Triage: false-positive runs → close the auto-created issue з коментарем; reopen якщо повторюється > 2x за тиждень.
# Schedule rationale: див. docs/90-work/initiatives/archive/_0009-agent-os-hardening.md § Phase 4 (PR 4.3 audit).

on:
  schedule:
    # 02:00 UTC daily (~05:00 Kyiv) — quiet hours.
    - cron: "0 2 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: extended-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  extended-flow:
    name: Extended-flow E2E (Playwright, ${{ matrix.browser }})
    runs-on: ubuntu-latest
    # On pull_request, only run when the 'extended-e2e' label is present.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'extended-e2e')
    timeout-minutes: 30
    strategy:
      # Webkit / mobile-safari додані у PR-48 (Better Auth security review).
      # На chromium запускаються `@extended` + `@auth` по grep-у; на webkit /
      # mobile-safari тільки `@auth` (Safari ITP / cookie regression). Якщо
      # webkit стане флакі — переводимо на schedule-only через окремий job.
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            grep: "@extended"
          - browser: webkit
            grep: "@auth"
          - browser: mobile-safari
            grep: "@auth"
    services:
      # pgvector/pgvector:pg17 — Postgres 17 + the `vector` extension
      # required by migration 025_ai_memories_pgvector.sql. Plain
      # postgres:17-alpine does not ship the extension and breaks
      # `db:migrate:dev` at boot. SHA-pinned (manifest-list digest).
      postgres:
        image: pgvector/pgvector:pg17@sha256:feb68f4f15446397d8cac7f4fe48fe4586de83160d1fc48b46283312d1a33966
        env:
          POSTGRES_USER: hub
          POSTGRES_PASSWORD: hub
          POSTGRES_DB: hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hub -d hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # NODE_ENV=test is mandatory: the server hard-blocks startup if
      # AI_QUOTA_DISABLED is truthy alongside NODE_ENV=production /
      # RAILWAY_*. Without this var the workflow would fail to boot the
      # API server (see assertStartupEnv in apps/server/src/env/env.ts).
      NODE_ENV: test
      DATABASE_URL: postgresql://hub:hub@127.0.0.1:5432/hub
      BETTER_AUTH_SECRET: smoke_test_better_auth_secret_32_chars_min
      AI_QUOTA_DISABLED: "1"
      VITE_API_BASE_URL: http://127.0.0.1:3000
      ALLOWED_ORIGINS: http://127.0.0.1:4173
      # Pins Better Auth's cookie domain to 127.0.0.1. Without this, Better
      # Auth falls back to `http://localhost:3000` as baseURL, which sets
      # cookies scoped to `localhost`. WebKit (unlike Chromium) does NOT treat
      # `localhost` and `127.0.0.1` as the same host — so session cookies set
      # for `localhost` are never sent to `http://127.0.0.1:3000`, causing
      # auth failures after page.reload() on WebKit/mobile-safari.
      BETTER_AUTH_URL: http://127.0.0.1:3000

    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @sergeant/db-schema
        # The server's `dev` script and `db:migrate:dev` import
        # `@sergeant/db-schema/pg`, which the package's `exports` map resolves
        # to `dist/pg/index.js`. Without this build step the import fails
        # with ERR_MODULE_NOT_FOUND at server boot — see waitlistService.ts /
        # drizzle.ts. Cheap (~5s, tsc only) and skips on remote-cache hit.
        run: pnpm --filter @sergeant/db-schema build

      - name: Resolve Playwright browser binary
        id: pw-bin
        # Mobile-safari використовує webkit binary (тільки інша emulation
        # config); тому матриця ставить webkit для обох mobile-safari і webkit.
        run: |
          if [ "${{ matrix.browser }}" = "mobile-safari" ]; then
            echo "binary=webkit" >> "$GITHUB_OUTPUT"
            echo "browsers=chromium webkit" >> "$GITHUB_OUTPUT"
            echo "cache-key=chromium-webkit" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.browser }}" = "webkit" ]; then
            echo "binary=webkit" >> "$GITHUB_OUTPUT"
            echo "browsers=chromium webkit" >> "$GITHUB_OUTPUT"
            echo "cache-key=chromium-webkit" >> "$GITHUB_OUTPUT"
          else
            echo "binary=${{ matrix.browser }}" >> "$GITHUB_OUTPUT"
            echo "browsers=chromium" >> "$GITHUB_OUTPUT"
            echo "cache-key=chromium" >> "$GITHUB_OUTPUT"
          fi

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm --filter @sergeant/web exec playwright --version | head -1)" >> "$GITHUB_OUTPUT"

      # actions/cache v5.0.5 (SHA-pinned for supply-chain hardening)
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-${{ steps.pw-bin.outputs.cache-key }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sergeant/web exec playwright install --with-deps ${{ steps.pw-bin.outputs.browsers }}

      - name: Install Playwright system deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @sergeant/web exec playwright install-deps ${{ steps.pw-bin.outputs.browsers }}

      - name: Run database migrations
        run: pnpm --filter @sergeant/server db:migrate:dev

      - name: Build web app
        run: pnpm --filter @sergeant/web build

      - name: Start API server
        run: pnpm --filter @sergeant/server dev &

      - name: Start Vite preview server
        run: pnpm --filter @sergeant/web preview -- --port 4173 --host 127.0.0.1 &

      - name: Wait for servers
        run: |
          echo "Waiting for API server on :3000…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; do sleep 2; done'
          echo "Waiting for preview server on :4173…"
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:4173 >/dev/null 2>&1; do sleep 2; done'
          echo "Both servers ready."

      - name: Run extended-flow E2E suite
        run: pnpm --filter @sergeant/web exec playwright test -c playwright.smoke.config.ts --project=${{ matrix.browser }} --grep ${{ matrix.grep }}
        env:
          CI: "true"
          PW_SKIP_WEBSERVER: "1"
          PW_BASE_URL: http://127.0.0.1:4173

      - name: Upload Playwright report
        if: always()
        # actions/upload-artifact v7.0.0 (SHA-pinned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-extended-flow-report-${{ matrix.browser }}
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 14

  notify-failure:
    name: Create/update issue on nightly failure
    runs-on: ubuntu-latest
    needs: extended-flow
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
      contents: read
    steps:
      # De-dup model mirrors nightly-audit.yml / typescript-next.yml:
      # one rolling tracker per workflow, refreshed in place on each failure.
      # If the maintainer closes it as resolved, the next failure opens a
      # new tracker — that signals a regression rather than a continuation.
      # actions/github-script v8.0.0 (SHA-pinned for supply-chain hardening)
      - name: Create or update GitHub issue for nightly failure
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const TITLE = 'Extended E2E nightly failure';
            const MARKER = '<!-- extended-e2e-failure-marker -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString().slice(0, 10);

            const body = [
              MARKER,
              `## Extended E2E nightly failed — ${now}`,
              '',
              `**Latest run:** ${runUrl}`,
              '',
              'The nightly extended-flow E2E suite (Playwright @extended + @auth across chromium / webkit / mobile-safari) failed.',
              'Please investigate and fix or mark as flaky.',
              '',
              `> Auto-generated by \`extended-e2e.yml\`. Last updated: ${new Date().toISOString()}.`,
              '> Close this issue when the underlying cause is fixed; a new tracker will be opened on the next failure.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'flaky-extended-e2e',
              state: 'open',
              per_page: 50,
            });

            const existing = issues.find((i) => i.title === TITLE && i.body?.includes(MARKER));

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing tracker #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: TITLE,
                body,
                labels: ['flaky-extended-e2e'],
              });
              core.info(`Created tracker #${created.data.number}`);
            }
