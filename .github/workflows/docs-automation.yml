name: Docs automation

# Owner: @SkOrDs-02 (solo maintainer per .github/CODEOWNERS).
# Triage: false-positive runs → close the auto-created issue з коментарем; reopen якщо повторюється > 2x за тиждень.
# Schedule rationale: див. docs/90-work/initiatives/archive/_0009-agent-os-hardening.md § Phase 4 (PR 4.3 audit).

# Guards documentation quality on every PR / push:
#
#   - playbook-index: regenerates docs/00-start/playbooks/INDEX.md and fails if the
#     checked-in copy drifts from the truth in `**Trigger:**` lines.
#   - markdown-links: walks every *.md file, verifies every internal link
#     resolves, and soft-warns on broken external URLs (enable
#     `--strict-external` once the external fleet is healthy).
#   - pr-body-validator: only on pull_request; checks that the PR body
#     follows `.github/PULL_REQUEST_TEMPLATE.md` (mandatory sections +
#     at least one ticked box in Pre-flight / Docs-updated).
#
# Each step runs independently so a single failing check doesn't mask the
# others — a PR author fixing a broken internal link shouldn't also lose
# the signal about a missing `## Why` section.

on:
  push:
    branches: [main]
  pull_request:
    # `edited` lets `pr-body-validator` re-run when the author fixes the
    # body in the GitHub UI without pushing a new commit. The default
    # trigger set (`opened, synchronize, reopened`) does not cover body
    # edits, and "Re-run failed jobs" replays the original event payload —
    # so without this the only way to re-validate a corrected body was to
    # push a no-op commit.
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

concurrency:
  group: docs-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playbook-index:
    name: Playbook trigger index (in sync)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"

      - name: Check docs/00-start/playbooks/INDEX.md is up to date
        run: node scripts/docs/generate-playbook-index.mjs --check

      - name: Check playbook files are in INDEX.md and catalog
        run: node scripts/docs/check-playbook-3way-sync.mjs

      - name: Check playbook schema (H1 + freshness + Status + Trigger)
        # Every playbook in docs/00-start/playbooks/ (excluding INDEX.md, README.md and
        # _TEMPLATE*) must declare an H1 title, a `Last validated` freshness
        # header, a `Status` lifecycle marker, and a `**Trigger:**` line.
        # See scripts/docs/check-playbook-schema.mjs for the exact schema.
        run: node scripts/docs/check-playbook-schema.mjs

      - name: Check playbook + SKILL language (Hard Rule #15) — blocker
        # Initiative 0009 PR 1.2c: gate-on. Backfill (PR 1.2b) reduced the
        # warn-list to 0; the linter now exits 1 on violations. The
        # `--warn-only` flag is still supported for ad-hoc local debugging.
        run: node scripts/check-playbook-language.mjs

  adr-graph:
    name: ADR graph (statuses, supersede, README index)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"

      - name: Validate docs/04-governance/adr/ graph integrity
        run: node scripts/docs/check-adr-graph.mjs

  initiative-followups:
    name: Initiative follow-ups (in sync)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs/90-work/initiatives/follow-ups.md is up to date
        # Regenerate the consolidated follow-ups index from each initiative's
        # `### Carry-over → successor` block and fail if the on-disk file
        # diverges. Source-of-truth = the initiative files themselves; the
        # index lives next to them and is rebuilt deterministically.
        run: pnpm docs:check-initiative-followups

  open-work:
    name: Open work (in sync)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs/open-work.md is up to date
        # Regenerate the single-pane open-work dashboard from `> **Status:**`
        # headers across every tracker (initiatives, planning, launch, audits,
        # security/hardening, tech-debt, superpowers/plans) and fail if the
        # on-disk file diverges. Source-of-truth = the individual tracker
        # docs themselves; the dashboard is rebuilt deterministically.
        run: pnpm docs:check-open-work

  daily-brief:
    name: Daily brief + WIP + trust badge (in sync)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs/today.md is up to date
        # `today.md` is regenerated daily by docs-daily-brief.yml. This
        # check catches PRs that touch a Status header or initiative
        # frontmatter without re-running the generator.
        run: pnpm docs:check-today

      - name: Check docs/STATUS.md is up to date
        # Control panel — same drift semantics as today.md. Everything is
        # regenerated from pr-ledger + tracker Status headers except the
        # hand-maintained FOCUS block, which is preserved across regen.
        run: pnpm docs:check-status

      - name: Check WIP limits (soft warn / hard fail)
        # Soft over-limit prints a warning to stderr but exits 0; hard
        # over-limit exits 1 and blocks the PR. Tuning: docs/04-governance/governance/wip-limits.json
        run: pnpm docs:check-wip-limits

      - name: Check trust badge in docs/README.md is up to date
        # Trust badge is a sliced block between TRUST-BADGE:START/END
        # markers in docs/README.md. Same drift semantics as today.md.
        run: pnpm docs:check-trust-badge

  hard-rules-matrix:
    name: Hard-rules matrix (in sync)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs/04-governance/governance/hard-rules-matrix.md is up to date
        # Regenerate the matrix from docs/04-governance/governance/hard-rules.json and fail if
        # the on-disk file diverges. Pairs with `pnpm lint:hard-rules-registry`,
        # which validates the JSON ↔ AGENTS.md ↔ CONTRIBUTING.md sync.
        run: pnpm hard-rules:check

      - name: Run generator unit tests (loadRegistry, renderMatrix, anchors)
        run: node --test scripts/docs/__tests__/generate-hard-rules-matrix.test.mjs

  markdown-links:
    name: Markdown link checker
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"

      # actions/cache v5.0.5 (SHA-pinned for supply-chain hardening)
      - name: Cache external-link HEAD results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/markdown-links
          key: markdown-links-${{ github.run_id }}
          restore-keys: |
            markdown-links-

      - name: Check markdown links
        # External URLs are fetched and failures are errors. The default
        # allowlist at docs/04-governance/governance/external-link-allowlist.json covers known
        # link-rot in immutable ADRs and hosts that block automated
        # user-agents (each entry carries a 'reason' field).
        run: node scripts/docs/check-markdown-links.mjs --strict-external

      - name: Check docs have at most one freshness marker
        # Coverage is enforced by docs:check-freshness-coverage; this catches
        # the drift class where a doc accumulates multiple Last validated rows.
        run: node scripts/docs/check-freshness-single-marker.mjs

      - name: Check tracked docs are within freshness cadence
        # Network-free CI twin of the nightly freshness issue creator.
        run: node scripts/docs/check-freshness.mjs --check-cadence

      - name: Check docs/04-governance/governance/freshness-dashboard.html is up to date
        # Committed dashboard ignores daily relative counters in --check mode,
        # but catches changed row membership and freshness header values.
        run: node scripts/docs/generate-freshness-dashboard.mjs --check

  pr-body-validator:
    name: PR body validator
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"

      - name: Validate PR body against PULL_REQUEST_TEMPLATE.md
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          # Fallback when the webhook payload's body field races ahead of
          # GitHub's storage (observed on freshly-opened PRs).
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Automated PRs (daily-brief cron, dependabot) are exempt from the
          # human feature-PR template — see isAutomatedAuthor() in the script.
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ci/validate-pr-body.mjs

  docs-scripts-tests:
    name: Docs-automation scripts unit tests
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      # bootstrap.test.mjs runs `pnpm bootstrap --check` (needs pnpm on PATH);
      # retrieval.test.mjs runs `build-retrieval-index.mjs --check`, which
      # imports `prettier` from node_modules — so this lane must install deps
      # (was install-free before, which made that --check subtest crash with
      # ERR_MODULE_NOT_FOUND: 'prettier').
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run node --test for docs-automation scripts
        run: |
          node --test \
            scripts/docs/__tests__/check-freshness.test.mjs \
            scripts/docs/__tests__/check-freshness-single-marker.test.mjs \
            scripts/docs/__tests__/check-playbook-3way-sync.test.mjs \
            scripts/docs/__tests__/freshness-stamp.test.mjs \
            scripts/docs/__tests__/generate-playbook-index.test.mjs \
            scripts/docs/__tests__/generate-initiative-followups.test.mjs \
            scripts/docs/__tests__/generate-open-work.test.mjs \
            scripts/docs/__tests__/generate-status.test.mjs \
            scripts/docs/__tests__/generate-freshness-dashboard.test.mjs \
            scripts/docs/__tests__/check-markdown-links.test.mjs \
            scripts/docs/__tests__/check-adr-graph.test.mjs \
            scripts/docs/__tests__/check-playbook-schema.test.mjs \
            scripts/__tests__/check-playbook-language.test.mjs \
            scripts/__tests__/check-agents-family-sync.test.mjs \
            scripts/__tests__/bootstrap.test.mjs \
            scripts/__tests__/lint-pii-handling-drift.test.mjs \
            scripts/agent/__tests__/retrieval.test.mjs \
            scripts/ci/__tests__/validate-pr-body.test.mjs
