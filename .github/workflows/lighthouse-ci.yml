name: Lighthouse CI

# Owner: @SkOrDs-02 (solo maintainer per .github/CODEOWNERS).
# Closes T5 у `docs/90-work/planning/sprint-roadmap-q2q3-2026.md` § 1.1 Тех-борг
# та P1.2 у `docs/90-work/audits/archive/2026-05-13-dead-code-hard-rules-roast.md` —
# previously planned-only workflow. Runs `@lhci/cli` autorun against the
# 4 routes (`/`, `/finyk`, `/fizruk`, `/nutrition/menu`)
# per `apps/web/lighthouserc.json` — LCP is `error`-gated at > 3000 ms
# (median); FCP ≤ 1500 ms and TBT ≤ 200 ms remain `warn`-only.
# Triage: metric warnings → open the report URLs from the log; runtime
# `NO_FCP` / server-start flakes are retried once and then soft-pass with
# a GitHub warning while the underlying Chrome trace issue remains open.

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".nvmrc"
      - ".github/workflows/lighthouse-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # `vite preview` (started by `lhci autorun` через `pnpm preview:lhci`)
  # serves `apps/web/dist/`. Default `pnpm --filter @sergeant/web build`
  # outputs to `../server/dist` for unified-mode serving (see
  # `apps/web/vite.config.js`). VERCEL=1 keeps the bundle in
  # `apps/web/dist/` so the preview server finds it. Mirrors the local
  # recipe in `apps/web/AGENTS.md § Lighthouse CI`.
  VERCEL: "1"

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      # Version is read from `packageManager` in root package.json.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @sergeant/db-schema
        # Same prebuild used in `ci.yml > critical-flow`,
        # `extended-e2e.yml`, `visual-regression.yml` — the web bundle
        # imports `@sergeant/db-schema/sqlite/migrations` (kvStoreBoot,
        # sqlite preload) and Rolldown fails to resolve without dist/
        # on disk. Cheap (~5 s, tsc only) and skips on remote-cache hit.
        run: pnpm --filter @sergeant/db-schema build

      - name: Build @sergeant/web (VERCEL=1 → apps/web/dist/)
        run: pnpm --filter @sergeant/web build

      - name: Run Lighthouse CI
        # `lhci autorun` boots `pnpm preview:lhci` (vite preview on
        # 127.0.0.1:4173), runs 3 desktop runs per URL across 4 routes,
        # asserts against `apps/web/lighthouserc.json`, and uploads
        # HTML reports to `temporary-public-storage`. Output:
        # `apps/web/.lighthouseci/` (uploaded as artifact below).
        shell: bash
        run: |
          set -o pipefail
          set +e

          for attempt in 1 2; do
            echo "::group::Lighthouse CI attempt ${attempt}"
            pnpm --filter @sergeant/web lighthouse 2>&1 | tee lhci-attempt.log
            status=${PIPESTATUS[0]}
            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if ! grep -Eq "NO_FCP|Timed out waiting for the server to start" lhci-attempt.log; then
              exit "$status"
            fi

            if [ "$attempt" -eq 2 ]; then
              echo "::warning::Lighthouse runtime flake after retry; keeping first-pass perf CI warn-only. Inspect lhci-attempt.log for NO_FCP/server-start details."
              exit 0
            fi

            echo "Retrying Lighthouse after transient runtime failure."
            sleep 5
          done

      - name: Upload Lighthouse reports
        if: always()
        # actions/upload-artifact v7.0.0 (SHA-pinned for supply-chain hardening)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lighthouse-reports
          path: apps/web/.lighthouseci/
          retention-days: 14
          if-no-files-found: warn
