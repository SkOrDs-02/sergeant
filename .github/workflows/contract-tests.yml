name: API contract tests

on:
  pull_request:
    paths:
      - "apps/server/src/**"
      - "packages/shared/src/openapi/**"
      - "scripts/api/**"
      - "scripts/pact-drift-check.mjs"
      - "scripts/post-deploy-smoke.mjs"
      - "scripts/smoke-tests.json"
      - "scripts/__tests__/pact-drift-check.test.mjs"
      - "scripts/__tests__/post-deploy-smoke.test.mjs"
      - ".github/workflows/pact-drift.yml"
      - ".github/workflows/post-deploy-smoke.yml"
      - "docs/02-engineering/api/openapi.json"
      - "packages/api-client/src/generated/openapi.d.ts"
      - "apps/server/src/__tests__/contracts/**"
      - ".github/workflows/contract-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi-roundtrip:
    name: OpenAPI freshness and runtime roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9.15.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check generated OpenAPI artifacts
        run: pnpm api:check-openapi && pnpm api:check-openapi-types

      # apps/server imports built subpath exports (e.g. `@sergeant/db-schema/pg`
      # from the waitlist route) that resolve to dist/ — build workspace deps
      # before running the suite, mirroring what `turbo run test` does in the
      # main check job.
      - name: Build workspace deps of apps/server
        run: pnpm --filter @sergeant/server^... build

      - name: Run runtime response roundtrip tests
        run: pnpm --filter @sergeant/server exec vitest run src/__tests__/contracts/openapi-roundtrip.test.ts --pool=forks --maxWorkers=1 --no-file-parallelism

      - name: Run pact-drift and post-deploy-smoke unit tests
        run: pnpm test:contract-drift-cli
