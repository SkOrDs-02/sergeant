name: Storybook deploy

# Owner: @Skords-01 (solo maintainer per .github/CODEOWNERS).
# Initiative: docs/initiatives/archive/_0007-design-system-tooling.md (Phase 5).
#
# Builds the @sergeant/web Storybook on every push to `main` and publishes
# the static output to GitHub Pages so reviewers + designers always have a
# canonical playground at https://skords-01.github.io/Sergeant/.
#
# PR builds run the same `pnpm build-storybook` step (no deploy) — that
# way a broken story is caught at PR time, not after merge. PR builds
# also upload the static bundle as a workflow artifact so reviewers can
# download it locally if they need to inspect the rendered HTML.
#
# Repo prerequisite: GitHub Pages must be enabled (Settings → Pages →
# Source = "GitHub Actions") for the deploy job to succeed. The first
# successful run will provision `https://skords-01.github.io/Sergeant/`.
#
# Triage: if the deploy fails, the GitHub Pages site keeps the previous
# build. False-positive runs → close the auto-issue with a comment;
# repeated failure (> 2x/week) → reopen and pair with the round-N
# initiative author.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/design-tokens/**"
      - ".github/workflows/storybook-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # GitHub Pages allows only one in-flight deploy at a time. Cancel
  # superseded runs so the latest `main` always wins.
  group: storybook-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        # Resolves base path / artifact url for the deploy step.
        # actions/configure-pages v5.0.0 (SHA-pinned for supply-chain hardening).
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Build Storybook
        # `--quiet` suppresses the per-story progress log lines; the
        # final summary + any warnings still print, which is what we
        # care about in CI. We invoke `storybook build` directly via
        # `pnpm exec` instead of going through the `build-storybook`
        # npm script — pnpm's `--` arg forwarding wraps extra args in
        # quotes, which storybook's CLI then rejects.
        working-directory: apps/web
        run: pnpm exec storybook build --output-dir storybook-static --quiet
        env:
          # Storybook reuses `apps/web/vite.config.js`. The vite-plugin-pwa
          # workbox precache breaks on the Storybook manager bundle (≥3 MiB
          # vs. 2 MiB workbox default) — `apps/web/.storybook/main.ts`
          # already strips the plugin in `viteFinal`, but pin NODE_ENV
          # anyway so a future contributor can't accidentally re-enable
          # PWA in the storybook build.
          NODE_ENV: production

      - name: Upload Storybook Pages artifact
        # actions/upload-pages-artifact v3.0.1 (SHA-pinned for supply-chain hardening).
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: apps/web/storybook-static

      - name: Upload Storybook PR artifact
        # actions/upload-artifact v4.6.2 (SHA-pinned for supply-chain hardening).
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: storybook-static-${{ github.event.pull_request.number }}
          path: apps/web/storybook-static
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        # actions/deploy-pages v4.0.5 (SHA-pinned for supply-chain hardening).
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
