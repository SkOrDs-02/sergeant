name: Deploy-config staging gate

# Owner: @Skords-01 (solo maintainer per .github/CODEOWNERS).
# Triage: false-positive runs → close the auto-created issue з коментарем; reopen якщо повторюється > 2x за тиждень.
# Schedule rationale: див. docs/initiatives/0009-agent-os-hardening.md § Phase 4 (PR 4.3 audit).

# Closes initiative 0011 phase 1 PR 1.3 — process guard against the
# "Vercel SSOT-flip" type-incident (PR #1595 → PR #1600). When a PR
# touches deploy-config files (vercel.json / fly.toml / railway.toml /
# Dockerfile* / apps/server/build.mjs / Caddyfile) it MUST carry a
# `verified-on-staging` label, applied by the author after manually
# verifying the change on a staging environment. The escape-hatch
# label `verified-on-staging-emergency` (for true production hotfixes
# where staging cannot be exercised) is permitted but requires the
# author to commit to a post-mortem as part of the PR.
#
# Comment-only / whitespace-only edits are exempt, because they cannot
# change deploy semantics. The exemption check uses the unified diff
# of the PR's deploy-config files: every non-blank changed line must
# be a comment in the corresponding file's syntax.
#
# Doc context:
#   docs/initiatives/0011-foundation-adoption-and-process-discipline.md
#     §Фаза 1 → PR 1.3 (process guard against deploy-config drift)
#   docs/playbooks/deploy-config-change.md (decision tree for verifying)
#   AGENTS.md hard rule on deploy safety / vercel SSOT.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  pull-requests: read
  contents: read

concurrency:
  group: deploy-config-staging-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  staging-gate:
    name: Deploy-config staging gate
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Check deploy-config diff and labels
        env:
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: node scripts/ci/check-deploy-config-staging-gate.mjs
