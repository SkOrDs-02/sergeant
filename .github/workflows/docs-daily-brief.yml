name: Docs daily brief

# Owner: @Skords-01 (solo maintainer).
# Purpose: regenerate the daily-ops artifacts (open-work / today / trust badge)
# from a scheduled run, then push the refreshed copy back to `main` if any of
# them drifted in the last 24 hours. Without this cron the artifacts would only
# refresh when a PR touches them, which would defeat the "open today.md every
# morning" maintainer routine — Status headers and Next review dates change
# silently as time passes.
#
# Schedule rationale: 06:00 UTC = ~08:00 / 09:00 Kyiv time, before the
# maintainer's working day. Aligned with existing observability cron blocks
# so a single morning glance covers product + docs health.
#
# Safety:
#   - The commit step uses the GITHUB_TOKEN with `contents: write` scoped
#     to this workflow only — no cross-repo bleed.
#   - `[skip ci]` in the commit message prevents an infinite loop with
#     docs-automation.yml drift gates.
#   - Manual trigger via `workflow_dispatch` so the maintainer can force a
#     refresh between scheduled runs without touching the repo.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-daily-brief
  cancel-in-progress: false

jobs:
  regen:
    name: Regenerate daily-ops artifacts and push
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Need write access to push back to main.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so the commit-and-push doesn't try to
          # restage anything; safe enough — the repo isn't large for a
          # nightly job.
          fetch-depth: 0

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate open-work + today + trust badge
        # `docs:gen-daily` is the orchestrator; runs open-work first because
        # both today and trust-badge consume its data, then today (because
        # trust-badge reads pickOverdueReview from it), then trust-badge.
        run: pnpm docs:gen-daily

      - name: Open auto-merge PR with refreshed artifacts (if any drift)
        # Direct push to `main` is blocked by branch protection (4 required
        # status checks). Instead: push to a short-lived bot branch, open a
        # labeled PR, and rely on GitHub's auto-merge to land it once the
        # protected-branch checks pass. This keeps branch protection intact
        # while preserving the daily-refresh cadence.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/open-work.md docs/today.md docs/README.md; then
            echo "no drift — nothing to commit"
            exit 0
          fi
          STAMP="$(date -u +%Y%m%d)"
          BRANCH="bot/docs-daily-brief-${STAMP}"
          # If a prior same-day run already opened the branch (e.g. manual
          # re-dispatch), reset it to the latest regen instead of failing.
          git checkout -B "$BRANCH"
          git add docs/open-work.md docs/today.md docs/README.md
          git commit -m "chore(docs): daily brief refresh"
          git push --force-with-lease origin "$BRANCH"
          # Reuse existing PR for the same day if one is already open.
          PR_URL="$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // ""')"
          if [ -z "$PR_URL" ]; then
            # PR creation by GITHUB_TOKEN requires repo setting:
            #   Settings → Actions → General → Workflow permissions →
            #     "Allow GitHub Actions to create and approve pull requests"
            # If that toggle is off, gh fails with a GraphQL error. Treat this
            # as a non-fatal degradation: branch is pushed, founder can open
            # the PR with one click from the URL printed below. Workflow stays
            # green so the daily cadence keeps signalling real failures.
            if ! PR_URL="$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(docs): daily brief refresh ${STAMP}" \
              --body "Auto-generated by \`docs-daily-brief.yml\` cron. Refreshed \`docs/open-work.md\`, \`docs/today.md\`, \`docs/README.md\` from the daily regen run. Safe to squash-merge once required checks pass." \
              --label documentation 2>&1)"; then
              echo "::warning title=Daily brief PR auto-create blocked::$PR_URL"
              echo "Branch pushed at https://github.com/${GITHUB_REPOSITORY}/tree/${BRANCH} — open the PR manually, or enable 'Allow GitHub Actions to create and approve pull requests' in repo Settings → Actions → General."
              exit 0
            fi
          fi
          # Auto-merge needs the same permission; degrade to warning if blocked.
          gh pr merge "$PR_URL" --auto --squash || echo "::warning title=Daily brief PR auto-merge blocked::$PR_URL (squash-merge it manually)"
