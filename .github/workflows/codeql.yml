name: CodeQL (JavaScript / TypeScript SAST)

# Statycznyj analyz TypeScript codebase via GitHub CodeQL — taint-flow
# matching для SQL injection, XSS, SSRF, prototype-pollution, path
# traversal та інших класів вразливостей, що OSV-Scanner / Trivy /
# eslint-plugin-security за дизайном не ловлять. Закриває
# `docs/security/hardening/I1-codeql-workflow.md` і завершує SAST/SCA
# trio (Trivy = container CVE; OSV-Scanner = lockfile CVE; CodeQL =
# source-code taint).
#
# Тригери:
# - push до main: ловимо merge-and-push patch-и, які проходять lint,
#   але вносять регресію.
# - pull_request: ловимо нові введення taint-flow ще до merge — алерти
#   видно у вкладці "Security" PR-а.
# - schedule (Mon 06:00 UTC): тижневий baseline-skan; CodeQL queries
#   періодично оновлюються upstream, тому щоразу новий запуск може
#   знайти нову проблему на тому ж source-tree.
#
# Усі actions SHA-pinned згідно з repo convention (див. ci.yml /
# container-scan.yml).
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Понеділок 06:00 UTC — після weekend-у, до початку робочого тижня.
    # Не перетинається з 03:00 (nightly-audit) і 04:00 (container-scan).
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  # actions: read потрібен CodeQL для inspect-у попередніх run-ів
  # (incremental analysis caching).
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # `javascript-typescript` покриває обидва React (JSX/TSX) на
        # apps/web + Node на apps/server, apps/console, apps/mobile.
        language: ["javascript-typescript"]

    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # github/codeql-action/init v4.35.2 (SHA-pinned)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7
        with:
          languages: ${{ matrix.language }}
          # security-extended розширює default suite на додаткові
          # вразливості (CWE-918 SSRF, CWE-79 XSS variants);
          # security-and-quality додає maintainability / correctness
          # check-и (unused-imports тощо). Обидві suite-и явно
          # рекомендовані аудитом I1.
          queries: security-extended,security-and-quality

      # github/codeql-action/analyze v4.35.2 (SHA-pinned)
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7
        with:
          category: "/language:${{ matrix.language }}"
