<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <!--
      `interactive-widget=resizes-content` — when iOS Safari (or any
      browser that honours the proposed `interactive-widget` attr)
      shows the soft keyboard, the layout viewport shrinks instead of
      sliding under the keyboard. Without it, fixed-position sheets
      like ManualExpenseSheet and HubChat have their inputs covered by
      the keyboard. Pairs with `viewport-fit=cover` so the content
      still reaches the safe-area edges when the keyboard is hidden.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <!--
      L3 — `docs/security/hardening/L3-meta-referrer.md`. Vercel sends
      `Referrer-Policy: strict-origin-when-cross-origin` from `vercel.json`
      headers. The duplicate `<meta name="referrer">` is defense-in-depth
      so the same policy still applies if the page is ever served without
      Vercel's response headers (file://, local Vite preview, dev proxy
      that strips headers). Keep it in sync with `vercel.json`.
    -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#fdf9f3"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#171412"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!--
      Defense-in-depth fallback for the production CSP. The canonical policy
      lives in the root `vercel.json` `headers[*]` block (see
      `docs/security/hardening/C2-frontend-csp.md`); a Vercel header always
      wins over a `<meta http-equiv>` tag, so this duplicate is invisible
      under normal conditions.

      It only kicks in when the page is loaded WITHOUT the Vercel headers —
      e.g. opened from disk via `file://`, served from a local Vite preview
      that hasn't replicated the Vercel config, or proxied through a
      development tool that strips response headers. In every one of those
      cases the SPA still loads in a CSP-protected context, so an XSS
      payload that slips into a dev build can't quietly exfiltrate data.

      Note: `<meta>` CSP cannot include `report-uri` / `frame-ancestors` /
      `sandbox` (HTML spec restriction), so the directive set here is a
      reduced superset of the Vercel policy. Keep the two in sync when the
      Vercel policy changes.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline' https://*.posthog.com https://*.sentry-cdn.com https://*.sentry.io https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http://localhost:3000 http://127.0.0.1:3000 https://*.sentry.io https://*.ingest.sentry.io https://*.posthog.com https://api.openclaw.com https://api.sergeant.app https://api.sergeantapp.com wss: ws:; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"
    />
    <title>Sergeant — Твій персональний хаб життя</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
